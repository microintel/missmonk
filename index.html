<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Missmonk</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════
   THEME TOKENS
════════════════════════════════════════════ */
:root {
  --bg:        #06090f;
  --bg2:       #0d1117;
  --surface:   #111820;
  --surface2:  #18202c;
  --surface3:  #1e2a38;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --blue:      #3b82f6;
  --blue-glow: rgba(59,130,246,0.25);
  --teal:      #2dd4bf;
  --amber:     #f59e0b;
  --rose:      #f43f5e;
  --green:     #22c55e;
  --text:      #f1f5f9;
  --text2:     #94a3b8;
  --text3:     #475569;
  --radius:    14px;
  --radius-lg: 20px;
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
  --nav-bg:    rgba(6,9,15,0.88);
  --topnav-h:  60px;
}
[data-theme="light"] {
  --bg:        #f0f4f8;
  --bg2:       #e8edf3;
  --surface:   #ffffff;
  --surface2:  #f8fafc;
  --surface3:  #e2e8f0;
  --border:    rgba(0,0,0,0.08);
  --border2:   rgba(0,0,0,0.13);
  --blue:      #2563eb;
  --blue-glow: rgba(37,99,235,0.2);
  --teal:      #0d9488;
  --amber:     #d97706;
  --rose:      #e11d48;
  --green:     #16a34a;
  --text:      #0f172a;
  --text2:     #475569;
  --text3:     #94a3b8;
  --shadow:    0 4px 20px rgba(0,0,0,0.1);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.15);
  --nav-bg:    rgba(240,244,248,0.92);
}
[data-theme="midnight"] {
  --bg:        #020408;
  --bg2:       #080c14;
  --surface:   #0c1220;
  --surface2:  #111828;
  --surface3:  #162032;
  --border:    rgba(120,150,255,0.1);
  --border2:   rgba(120,150,255,0.18);
  --blue:      #818cf8;
  --blue-glow: rgba(129,140,248,0.3);
  --teal:      #34d399;
  --amber:     #fbbf24;
  --rose:      #fb7185;
  --green:     #4ade80;
  --text:      #e8eeff;
  --text2:     #8890a8;
  --text3:     #3a4060;
  --nav-bg:    rgba(2,4,8,0.9);
}
[data-theme="forest"] {
  --bg:        #0a1208;
  --bg2:       #0f1a0c;
  --surface:   #132010;
  --surface2:  #182a14;
  --surface3:  #1e3518;
  --border:    rgba(100,200,100,0.1);
  --border2:   rgba(100,200,100,0.18);
  --blue:      #4ade80;
  --blue-glow: rgba(74,222,128,0.25);
  --teal:      #34d399;
  --amber:     #fde68a;
  --rose:      #fca5a5;
  --green:     #86efac;
  --text:      #ecfdf5;
  --text2:     #6ee7b7;
  --text3:     #2a5a30;
  --nav-bg:    rgba(10,18,8,0.9);
}
[data-theme="sunset"] {
  --bg:        #130508;
  --bg2:       #1a0a10;
  --surface:   #220e16;
  --surface2:  #2a1220;
  --surface3:  #36182a;
  --border:    rgba(255,100,100,0.1);
  --border2:   rgba(255,100,100,0.18);
  --blue:      #fb923c;
  --blue-glow: rgba(251,146,60,0.28);
  --teal:      #f472b6;
  --amber:     #fde68a;
  --rose:      #f87171;
  --green:     #4ade80;
  --text:      #fff1f2;
  --text2:     #fca5a5;
  --text3:     #5a2030;
  --nav-bg:    rgba(19,5,8,0.9);
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Satoshi',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
  transition:background .3s, color .3s;
}
button { cursor:pointer; font-family:inherit; }
input  { font-family:inherit; }
a { color:inherit; text-decoration:none; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:4px; }

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(59,130,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(45,212,191,0.05) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════ */
#appShell { display:flex; flex-direction:column; min-height:100vh; position:relative; z-index:1; }

/* ── TOP NAV ── */
.topnav {
  position:sticky; top:0; z-index:50;
  background:var(--nav-bg);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 1rem;
  height:var(--topnav-h);
  display:flex; align-items:center; gap:.75rem;
}
.nav-logo {
  display:flex; align-items:center; gap:.55rem;
  font-family:'Clash Display',sans-serif;
  font-size:1.1rem; font-weight:700;
  flex-shrink:0;
  color:var(--text);
}
.nav-logo-icon {
  width:30px; height:30px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  border-radius:9px;
  display:grid; place-items:center;
  font-size:.9rem; flex-shrink:0;
}
.nav-spacer { flex:1; }

/* Search */
.nav-search {
  position:relative; display:flex; align-items:center;
  flex:1; max-width:340px; min-width:0;
}
.nav-search-input {
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:30px;
  padding:.4rem .9rem .4rem 2.2rem;
  color:var(--text); font-size:.83rem;
  width:100%; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.nav-search-input:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-glow);
}
.nav-search-input::placeholder { color:var(--text3); }
.nav-search-icon {
  position:absolute; left:.72rem;
  color:var(--text3); font-size:.85rem; pointer-events:none;
}
.search-clear {
  position:absolute; right:.65rem;
  background:none; border:none; color:var(--text3);
  font-size:.9rem; padding:.1rem; display:none;
  line-height:1;
}
.search-clear.show { display:block; }

/* Nav icon buttons */
.nav-icon-btn {
  background:none; border:none;
  color:var(--text2); font-size:1.1rem;
  padding:.35rem; border-radius:8px;
  transition:background .15s, color .15s;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.nav-icon-btn:hover { background:var(--surface2); color:var(--text); }

/* Hamburger */
.nav-burger {
  display:none; background:none; border:none;
  color:var(--text2); font-size:1.2rem; padding:.35rem;
  border-radius:8px; flex-shrink:0;
  transition:background .15s;
}
.nav-burger:hover { background:var(--surface2); }

/* ── THEME PICKER PANEL ── */
.theme-panel {
  position:fixed; top:0; right:0; bottom:0; z-index:150;
  width:280px; background:var(--surface);
  border-left:1px solid var(--border2);
  box-shadow:-8px 0 40px rgba(0,0,0,0.4);
  padding:1.5rem;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
.theme-panel.open { transform:translateX(0); }
.theme-panel-title {
  font-family:'Clash Display',sans-serif;
  font-size:1rem; font-weight:700; margin-bottom:1.2rem;
  display:flex; align-items:center; justify-content:space-between;
  color:var(--text);
}
.theme-close {
  background:none; border:none; color:var(--text3);
  font-size:1.1rem; cursor:pointer; padding:.2rem; border-radius:6px;
}
.theme-close:hover { color:var(--text); background:var(--surface2); }
.theme-options { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:1.4rem; }
.theme-opt {
  border:2px solid var(--border);
  border-radius:var(--radius);
  padding:.75rem .6rem;
  cursor:pointer; text-align:center;
  transition:border-color .2s, transform .15s;
  background:var(--surface2);
}
.theme-opt:hover { transform:translateY(-2px); border-color:var(--border2); }
.theme-opt.active { border-color:var(--blue); }
.theme-opt-swatch {
  display:flex; gap:3px; justify-content:center;
  margin-bottom:.4rem;
}
.swatch-dot { width:14px; height:14px; border-radius:50%; }
.theme-opt-name { font-size:.73rem; font-weight:600; color:var(--text2); }
.theme-divider { border:none; border-top:1px solid var(--border); margin:.8rem 0; }
.theme-section-lbl {
  font-size:.7rem; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text3); margin-bottom:.6rem;
}
.url-form { display:flex; flex-direction:column; gap:.55rem; }
.url-input {
  width:100%; padding:.6rem .85rem;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--text); font-size:.8rem;
  outline:none; font-family:inherit;
  transition:border-color .2s;
}
.url-input:focus { border-color:var(--blue); }
.url-input::placeholder { color:var(--text3); }
.btn-sm {
  padding:.5rem .85rem;
  background:var(--blue);
  border:none; border-radius:10px;
  color:#fff; font-size:.8rem; font-weight:700;
  cursor:pointer; transition:opacity .15s, transform .15s;
}
.btn-sm:hover { opacity:.85; transform:translateY(-1px); }
.btn-sm.secondary { background:var(--surface3); color:var(--text2); }
.btn-sm.secondary:hover { color:var(--text); }
.url-status {
  font-size:.75rem; padding:.4rem .65rem;
  border-radius:8px; display:none;
}
.url-status.ok  { display:block; background:rgba(34,197,94,0.12); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.url-status.err { display:block; background:rgba(244,63,94,0.12); color:var(--rose); border:1px solid rgba(244,63,94,.25); }
.url-status.loading { display:block; background:rgba(59,130,246,0.1); color:var(--blue); border:1px solid rgba(59,130,246,.2); }

/* ── MAIN LAYOUT ── */
.shell-body { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width:256px; flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar-inner { flex:1; overflow-y:auto; padding:1rem .75rem; }
.sidebar-section-label {
  font-size:.65rem; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--text3); padding:.3rem .7rem .6rem;
}
.course-item {
  display:flex; align-items:center; gap:.7rem;
  padding:.6rem .7rem;
  border-radius:var(--radius);
  cursor:pointer;
  transition:background .15s, color .15s;
  color:var(--text2); font-size:.88rem; font-weight:500;
  margin-bottom:.15rem;
  border:1.5px solid transparent;
}
.course-item:hover { background:var(--surface); color:var(--text); }
.course-item.active {
  background:linear-gradient(90deg,rgba(59,130,246,.18),rgba(59,130,246,.06));
  border-color:rgba(59,130,246,.3);
  color:var(--blue);
}
.course-emoji {
  width:32px; height:32px; border-radius:9px;
  background:var(--surface2);
  display:grid; place-items:center;
  font-size:.95rem; flex-shrink:0;
  transition:background .15s;
}
.course-item.active .course-emoji { background:rgba(59,130,246,.15); }
.course-info { flex:1; min-width:0; }
.course-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:.87rem; }
.course-count { font-size:.68rem; color:var(--text3); font-weight:400; margin-top:1px; }

/* Sidebar footer branding */
.sidebar-footer {
  padding:.85rem 1rem;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-brand {
  font-size:.68rem; color:var(--text3); text-align:center; line-height:1.5;
}
.sidebar-brand strong { color:var(--text2); }

/* Mobile overlay */
.sidebar-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.6); z-index:39;
  backdrop-filter:blur(3px);
}

/* ── CONTENT AREA ── */
.content {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:1.8rem 1.8rem 3rem;
  min-width:0;
}

/* ── WELCOME HERO ── */
.welcome-hero {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:55vh;
  text-align:center; gap:1rem;
  animation:fadeUp .5s ease both;
}
.hero-glow {
  width:88px; height:88px; border-radius:28px;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:grid; place-items:center; font-size:2.2rem;
  box-shadow:0 0 60px var(--blue-glow), 0 0 120px rgba(45,212,191,.1);
  margin-bottom:.5rem;
}
.hero-title {
  font-family:'Clash Display',sans-serif;
  font-size:2rem; font-weight:700;
  background:linear-gradient(90deg,var(--text) 0%,var(--teal) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-sub { color:var(--text2); font-size:.93rem; max-width:360px; line-height:1.7; font-weight:300; }
.hero-stats {
  display:flex; gap:1.2rem; margin-top:.5rem; flex-wrap:wrap; justify-content:center;
}
.hero-stat {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:.65rem 1.1rem;
  text-align:center; min-width:85px;
}
.hero-stat-val {
  font-family:'Clash Display',sans-serif;
  font-size:1.35rem; font-weight:700; color:var(--blue);
}
.hero-stat-key { font-size:.68rem; color:var(--text3); margin-top:1px; }

/* Dev credit */
.dev-credit {
  text-align:center; font-size:.72rem; color:var(--text3);
  margin-top:1.5rem; letter-spacing:.03em;
}
.dev-credit strong { color:var(--blue); }

/* ── BREADCRUMB ── */
.breadcrumb {
  display:flex; align-items:center; gap:.25rem;
  flex-wrap:wrap; margin-bottom:1.3rem;
  font-size:.78rem;
}
.crumb {
  color:var(--text3); cursor:pointer;
  padding:.18rem .38rem; border-radius:6px;
  transition:color .15s, background .15s; font-weight:400;
}
.crumb:hover { color:var(--blue); background:rgba(59,130,246,.08); }
.crumb.active { color:var(--text); cursor:default; font-weight:500; }
.crumb-sep { color:var(--text3); font-size:.7rem; }

/* ── PAGE HEADER ── */
.page-header { margin-bottom:1.5rem; }
.page-tag {
  display:inline-flex; align-items:center; gap:.35rem;
  font-size:.67rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:.26rem .62rem; border-radius:6px;
  background:rgba(59,130,246,.12); color:var(--blue);
  margin-bottom:.55rem;
}
.page-tag.teal  { background:rgba(45,212,191,.12); color:var(--teal); }
.page-tag.amber { background:rgba(245,158,11,.12); color:var(--amber); }
.page-title {
  font-family:'Clash Display',sans-serif;
  font-size:1.65rem; font-weight:700; line-height:1.2; margin-bottom:.25rem;
  color:var(--text);
}
.page-meta { font-size:.8rem; color:var(--text2); font-weight:300; }
.page-header-row {
  display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;
}
.share-btn {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:.45rem .8rem;
  font-size:.78rem; color:var(--text2);
  display:flex; align-items:center; gap:.4rem;
  transition:background .15s, color .15s, border-color .15s;
  flex-shrink:0;
}
.share-btn:hover { background:var(--surface3); color:var(--text); border-color:var(--border2); }

/* depth progress */
.depth-prog { height:2px; background:var(--border); border-radius:1px; margin-bottom:1.5rem; overflow:hidden; }
.depth-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--teal)); border-radius:1px; transition:width .4s ease; }

/* ── CARD GRID ── */
.card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:.9rem;
}

/* ── CARD ── */
.card {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius-lg);
  padding:1.2rem 1.1rem 1rem;
  cursor:pointer; position:relative; overflow:hidden;
  transition:transform .22s cubic-bezier(.4,0,.2,1),
             border-color .22s, box-shadow .22s;
  animation:fadeUp .35s ease both;
  display:flex; flex-direction:column; gap:.45rem;
}
.card::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg,rgba(59,130,246,.06) 0%,transparent 60%);
  opacity:0; transition:opacity .22s;
}
.card:hover { transform:translateY(-3px); border-color:rgba(59,130,246,.4); box-shadow:0 10px 30px rgba(59,130,246,.12); }
.card:hover::after { opacity:1; }
.card.empty { opacity:.5; cursor:default; }
.card.empty:hover { transform:none; border-color:var(--border); box-shadow:none; }
.card.empty:hover::after { opacity:0; }

.card-type-badge {
  display:inline-flex; align-items:center; gap:.3rem;
  font-size:.62rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
  padding:.2rem .52rem; border-radius:5px;
  background:rgba(59,130,246,.12); color:var(--blue);
  width:fit-content;
}
.card-type-badge.teal  { background:rgba(45,212,191,.12); color:var(--teal); }
.card-type-badge.amber { background:rgba(245,158,11,.12); color:var(--amber); }
.card-type-badge.muted { background:var(--surface3); color:var(--text3); }
.card-type-badge.rose  { background:rgba(244,63,94,.12); color:var(--rose); }

.card-title {
  font-family:'Clash Display',sans-serif;
  font-size:.94rem; font-weight:600;
  line-height:1.35; color:var(--text);
}
.card-footer {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:auto; padding-top:.25rem;
}
.card-count { font-size:.71rem; color:var(--text3); font-weight:400; }
.card-arrow { color:var(--text3); font-size:1rem; transition:transform .2s, color .2s; }
.card:not(.empty):hover .card-arrow { color:var(--blue); transform:translate(2px,-2px); }

.card.link-card {
  border-color:rgba(45,212,191,.25);
  background:linear-gradient(135deg,rgba(45,212,191,.05) 0%,var(--surface) 60%);
}
.card.link-card:hover { border-color:rgba(45,212,191,.5); box-shadow:0 10px 30px rgba(45,212,191,.1); }

/* Info card — plain text values */
.card.info-card {
  border-color:rgba(245,158,11,.2);
  background:linear-gradient(135deg,rgba(245,158,11,.04) 0%,var(--surface) 60%);
  cursor:default;
}
.card.info-card:hover {
  transform:none;
  border-color:rgba(245,158,11,.38);
  box-shadow:0 6px 20px rgba(245,158,11,.08);
}
.card.info-card:hover::after { opacity:0; }
.card-info-text {
  font-size:.8rem; color:var(--text2);
  line-height:1.6; word-break:break-word;
  margin-top:.1rem;
}

/* Search highlight */
.highlight { background:rgba(59,130,246,.25); border-radius:3px; padding:0 2px; color:var(--blue); font-weight:600; }

/* ── EMPTY STATE ── */
.empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:4rem 2rem; text-align:center; gap:.7rem;
  color:var(--text3);
}
.empty-state .ei { font-size:2.5rem; opacity:.35; }
.empty-state h3 { font-family:'Clash Display',sans-serif; font-size:1rem; color:var(--text2); }
.empty-state p  { font-size:.8rem; max-width:260px; line-height:1.6; }

/* ── MODAL ── */
.modal-backdrop {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.85); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; padding:1rem;
}
.modal-backdrop.open { display:flex; }
.modal-box {
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:24px;
  width:100%; max-width:900px;
  height:85vh; max-height:720px;
  display:flex; flex-direction:column; overflow:hidden;

/* ── SEARCH RESULTS ── */
.search-results {

  border:1px solid var(--border2);

}
.search-results.open { display:block; }
.sr-item {
  padding:.52rem .9rem;
  font-size:.83rem; cursor:pointer;
  display:flex; align-items:flex-start; gap:.6rem;
  transition:background .15s;
}
.sr-item:hover { background:var(--surface2); }
.sr-item-icon { font-size:.9rem; flex-shrink:0; margin-top:1px; }
.sr-item-body { flex:1; min-width:0; }
.sr-item-label { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
.sr-path { font-size:.7rem; color:var(--text3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.sr-section { padding:.35rem .9rem .1rem; font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); }

/* ── SHARE POPUP ── */
.share-popup {

  display:none; align-items:center; justify-content:center;

}

.share-url-input {

}
.share-methods { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; margin-bottom:1rem; }
.share-method-btn {
  padding:.65rem .6rem;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:12px; color:var(--text2);
  font-size:.82rem; font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:.4rem;

}
.share-method-btn:hover { background:var(--surface3); color:var(--text); border-color:var(--border2); }
.share-close-btn {
  width:100%; padding:.6rem;
  background:none; border:1px solid var(--border);
  border-radius:10px; color:var(--text3); font-size:.82rem;
  transition:background .15s;
}
.share-close-btn:hover { background:var(--surface2); color:var(--text2); }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:1.2rem; right:1.2rem; z-index:300;
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--radius);
  padding:.65rem 1rem;
  font-size:.83rem; color:var(--text);
  box-shadow:var(--shadow);
  display:flex; align-items:center; gap:.5rem;
  transform:translateY(100px); opacity:0;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  pointer-events:none; max-width:300px;
}
.toast.show { transform:translateY(0); opacity:1; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(18px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeScaleIn {
  from { opacity:0; transform:scale(.92); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes fadeDown {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}

<!-- ══════════════════════════════════
     JAVASCRIPT
══════════════════════════════════ -->
<script>
/* ══════════════════════════════
   BUILT-IN CURRICULUM DATA
══════════════════════════════ */
const BUILT_IN_CURRICULUM = {
  "diploma": {
    "sem1": {
      "engineering mathematics": {
        "matrix and determinants": {
          "matrix & types": '<a href="https://microintel.github.io/missmonk/diploma/sem1/maths/matrix/matrix&types.html">Matrix & Types</a>'
        }
      },
      "Fundamentals of Computer": {
        "BASICS OF LOGIC DESIGN": {
          "Introduction to number system": {
            "Binary, Octal, Decimal, Hexadecimal": {}
          }
        },
        "LOGIC CIRCUITS": {},
        "INTRODUCTION TO COMPUTER CONCEPTS": {},
        "INTRODUCTION TO COMPUTER ORGANIZATION & OPERATING SYSTEM": {},
        "INTRODUCTION TO COMPUTER PROGRAMMING": {}
      },
      "Fundamentals of Electrical and Electronics Engineering": {},
      "IT Skills": {},
      "Environmental Sustainability": {}
    },
    "sem2": {}, "sem3": {}, "sem4": {}, "sem5": {}, "sem6": {}
  },
  "engineering": {},
  "Financial": {
    "Stock Market": {
      "Stock Market": {
        "Basics of Stock Market": { "Role of Stock Market": {} },
        "How Stock Prices Move?": {},
        "Set-up your Trading System": {}
      },
      "Stock Research": {},
      "Evaluating Companies": {},
      "Valuation of Stocks": {},
      "When to Buy & When to Sell?": {},
      "Managing a Portfolio": {},
      "How to Grow your Money?": {}
    }
  }
};

const COURSE_META = {
  diploma:     { icon:'📐', color:'blue',  label:'Diploma' },
  engineering: { icon:'⚙️', color:'amber', label:'Engineering' },
  Financial:   { icon:'📈', color:'teal',  label:'Financial' },
};

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let CURRICULUM    = JSON.parse(JSON.stringify(BUILT_IN_CURRICULUM));
let pathStack     = [];
let currentCourse = null;
let modalLessonKey   = null;
let modalLessonHref  = null;
let modalLessonLabel = null;
let allLessons    = [];

/* ══════════════════════════════
   THEME
══════════════════════════════ */
function applyTheme(theme) {
  if (theme === 'dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === theme);
  });
  localStorage.setItem('lp_theme', theme);
}
function toggleThemePanel() { document.getElementById('themePanel').classList.toggle('open'); }
function closeThemePanel()  { document.getElementById('themePanel').classList.remove('open'); }

/* ══════════════════════════════
   URL FETCH
══════════════════════════════ */
async function fetchFromUrl() {
  const url    = document.getElementById('urlInput').value.trim();
  const status = document.getElementById('urlStatus');
  if (!url) { setUrlStatus('err', 'Please enter a URL.'); return; }
  setUrlStatus('loading', '⏳ Fetching…');
  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const parsed = parseCurriculumData(data);
    if (!parsed) throw new Error('Invalid curriculum format');
    CURRICULUM = parsed;
    allLessons = [];
    buildLessonIndex(CURRICULUM, []);
    buildAll();
    if (currentCourse && !CURRICULUM[currentCourse]) { currentCourse = null; pathStack = []; }
    if (currentCourse) renderContent(); else showWelcome();
    setUrlStatus('ok', `✓ Loaded ${Object.keys(CURRICULUM).length} course(s)`);
    showToast('✓ Curriculum loaded!');
  } catch(e) {
    setUrlStatus('err', '✗ ' + e.message);
    showWelcome();
  }
}

function parseCurriculumData(data) {
  if (!data || typeof data !== 'object') return null;
  if (Array.isArray(data)) {
    const result = {};
    for (const item of data) {
      if (!item.name) continue;
      if (item.url)      result[item.name] = `<a href="${item.url}">${item.name}</a>`;
      else if (item.children) result[item.name] = parseCurriculumData(item.children) || {};
      else result[item.name] = {};
    }
    return result;
  }
  return data;
}

function setUrlStatus(type, msg) {
  const el = document.getElementById('urlStatus');
  el.className = 'url-status ' + type;
  el.textContent = msg;
}

function resetToBuiltIn() {
  CURRICULUM = JSON.parse(JSON.stringify(BUILT_IN_CURRICULUM));
  allLessons = [];
  buildLessonIndex(CURRICULUM, []);
  buildAll();
  currentCourse = null; pathStack = [];
  showWelcome();
  document.getElementById('urlInput').value = 'https://microintel.github.io/missmonk/data.json';
  setUrlStatus('', '');
  showToast('↩ Reset to built-in curriculum');
}

/* ══════════════════════════════
   AUTO-INIT
══════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  // Restore theme
  const savedTheme = localStorage.getItem('lp_theme') || 'dark';
  applyTheme(savedTheme);

  // Show loading state
  document.getElementById('content').innerHTML = `
    <div class="welcome-hero">
      <div class="hero-glow">⏳</div>
      <h1 class="hero-title">Loading…</h1>
      <p class="hero-sub">Fetching curriculum from Missmonk</p>
    </div>`;

  // Auto-fetch from the live URL
  await fetchFromUrl();

  // Keyboard shortcut
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Escape') clearSearch();
  });
  // Close panels on outside click
  document.addEventListener('click', e => {
    if (!document.getElementById('searchWrapper')?.contains(e.target))
      document.getElementById('searchResults').classList.remove('open');
    if (!document.getElementById('themePanel')?.contains(e.target) && !e.target.closest('.nav-icon-btn'))
      document.getElementById('themePanel')?.classList.remove('open');
  });
});

/* ══════════════════════════════
   LESSON INDEX
══════════════════════════════ */
function buildLessonIndex(obj, path) {
  if (typeof obj !== 'object' || obj === null) return;
  for (const key of Object.keys(obj)) {
    const val = obj[key];
    const p   = [...path, key];
    if (typeof val === 'string' && extractHref(val)) {
      allLessons.push({
        key, label: extractText(val) || cleanKey(key),
        href: extractHref(val), path: p.join(' › '),
        pathArr: p
      });
    } else {
      buildLessonIndex(val, p);
    }
  }
}

/* ══════════════════════════════
   UTILS
══════════════════════════════ */
function extractHref(s) {
  if (typeof s !== 'string') return null;
  const m = s.match(/href="([^"]+)"/);
  return m ? m[1] : (s.startsWith('http') ? s : null);
}
function extractText(s) {
  if (typeof s !== 'string') return null;
  const m = s.match(/>([^<]+)</);
  return m ? m[1].trim() : null;
}
function countDeep(obj) {
  if (!obj || typeof obj !== 'object') return 0;
  const ks = Object.keys(obj);
  return ks.length + ks.reduce((a, k) => a + countDeep(obj[k]), 0);
}
function countLessons(obj) {
  if (typeof obj === 'string') return extractHref(obj) ? 1 : 0;
  if (!obj || typeof obj !== 'object') return 0;
  return Object.values(obj).reduce((a, v) => a + countLessons(v), 0);
}
function cleanKey(k) { return String(k).replace(/\t/g,' ').replace(/\s+/g,' ').trim(); }
function lessonId(path, key) { return btoa(encodeURIComponent([...path, key].join('|'))).replace(/=/g,''); }
function highlightQuery(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + esc + ')', 'gi'), '<span class="highlight">$1</span>');
}

/* ══════════════════════════════
   BUILD SIDEBAR
══════════════════════════════ */
function buildAll() { buildSidebar(); }

function buildSidebar() {
  const inner = document.getElementById('sidebarInner');
  inner.innerHTML = `<div class="sidebar-section-label">Courses</div>`;
  Object.keys(CURRICULUM).forEach(course => {
    const meta  = COURSE_META[course] || { icon:'📚', color:'blue', label: cleanKey(course) };
    const total = countLessons(CURRICULUM[course]);
    const div   = document.createElement('div');
    div.className = 'course-item';
    div.id = 'si-' + CSS.escape(course);
    div.innerHTML = `
      <div class="course-emoji">${meta.icon}</div>
      <div class="course-info">
        <div class="course-name">${cleanKey(course)}</div>
        <div class="course-count">${total} lesson${total!==1?'s':''}</div>
      </div>`;
    div.onclick = () => selectCourse(course);
    inner.appendChild(div);
  });
}

/* ══════════════════════════════
   NAVIGATION
══════════════════════════════ */
function selectCourse(course) {
  currentCourse = course;
  pathStack     = [{ key: cleanKey(course), obj: CURRICULUM[course] }];
  document.querySelectorAll('.course-item').forEach(el => el.classList.remove('active'));
  const si = document.getElementById('si-' + CSS.escape(course));
  if (si) si.classList.add('active');
  renderContent();
  closeSidebarMobile();
}
function navPush(key, obj) {
  pathStack.push({ key: cleanKey(key), obj });
  renderContent();
}
function navTo(idx) {
  pathStack = pathStack.slice(0, idx + 1);
  renderContent();
}

/* ══════════════════════════════
   RENDER CONTENT
══════════════════════════════ */
function renderContent() {
  if (!currentCourse) { showWelcome(); return; }
  const cur      = pathStack[pathStack.length - 1];
  const obj      = cur.obj;
  const depth    = pathStack.length - 1;
  const depthLabels = ['', 'Semester', 'Subject', 'Chapter', 'Topic', 'Subtopic'];
  const childLabel  = depthLabels[depth] || 'Item';
  const meta        = COURSE_META[currentCourse] || { color:'blue' };

  // Breadcrumb
  const crumbs = pathStack.map((p, i) => {
    const isLast = i === pathStack.length - 1;
    return `<span class="crumb${isLast?' active':''}" ${!isLast?`onclick="navTo(${i})"`:''} >${p.key}</span>`;
  }).join('<span class="crumb-sep"> › </span>');

  const childCount = typeof obj === 'object' && obj !== null ? Object.keys(obj).length : 0;
  const pct = Math.min((depth / 5) * 100, 100);

  const topicPath    = pathStack.map(p => p.key).join(' › ');

  let html = `
    <div class="breadcrumb">${crumbs}</div>
    <div class="depth-prog"><div class="depth-fill" style="width:${pct}%"></div></div>
    <div class="page-header">
      <div class="page-header-row">
        <div>
          <div class="page-tag ${meta.color}">${COURSE_META[currentCourse]?.icon||'📚'} ${childLabel||'Course'}</div>
          <div class="page-title">${cur.key}</div>
          <div class="page-meta">${childCount} item${childCount!==1?'s':''} · ${countDeep(obj)} total · ${countLessons(obj)} lesson${countLessons(obj)!==1?'s':''}</div>
        </div>
        <button class="share-btn" onclick="openSharePopup('${topicPath.replace(/'/g,"\\'")}', '${window.location.href}')">⬆ <span>Share</span></button>
      </div>
    </div>`;

  // String leaf
  if (typeof obj === 'string') {
    const href  = extractHref(obj);
    if (href) {
      const label = extractText(obj) || cur.key;
      const lid   = lessonId(pathStack.slice(0,-1).map(p=>p.key), cur.key);
      html += `
        <div class="card-grid">
          <div class="card link-card" onclick="openLesson('${href}','${label}','${lid}')">
            <div class="card-type-badge teal">📄 Lesson</div>
            <div class="card-title">${label}</div>
            <div class="card-footer"><span class="card-count">Click to study</span><span class="card-arrow">↗</span></div>
          </div>
        </div>`;
    } else {
      // Plain text info value
      html += `
        <div class="card-grid">
          <div class="card info-card" style="grid-column:1/-1">
            <div class="card-type-badge amber">ℹ️ Info</div>
            <div class="card-title">${cur.key}</div>
            <div class="card-info-text">${obj.trim()}</div>
          </div>
        </div>`;
    }
    document.getElementById('content').innerHTML = html;
    return;
  }

  if (!obj || typeof obj !== 'object') {
    html += `<div class="empty-state"><div class="ei">🚧</div><h3>Coming Soon</h3><p>Content will be added soon.</p></div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  const keys = Object.keys(obj);
  if (keys.length === 0) {
    html += `<div class="empty-state"><div class="ei">🚧</div><h3>Content Coming Soon</h3><p>This section is being built. Check back later!</p></div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  html += `<div class="card-grid" id="cardGrid">`;
  for (const key of keys) {
    const val    = obj[key];
    const ck     = cleanKey(key);
    const isLink = typeof val === 'string' && extractHref(val);
    const isInfo = typeof val === 'string' && !extractHref(val);
    const href   = isLink ? extractHref(val) : null;
    const lbl    = isLink ? (extractText(val)||ck) : ck;
    const isEmpty= !isLink && !isInfo && (typeof val !== 'object' || val === null || Object.keys(val).length === 0);
    const deep   = countDeep(val);
    const lcount = countLessons(val);
    const lid    = isLink ? lessonId(pathStack.map(p=>p.key), key) : null;

    const tagColor = depth === 0 ? 'blue' : depth === 1 ? 'amber' : 'teal';
    const tagIcon  = depth === 0 ? '🗓️' : depth === 1 ? '📚' : depth === 2 ? '📖' : '🔹';
    const subLbl   = depth === 0 ? 'Semester' : depth === 1 ? 'Subject' : depth === 2 ? 'Chapter' : 'Topic';

    if (isLink) {
      html += `<div class="card link-card" data-a="link" data-href="${href}" data-label="${lbl.replace(/"/g,'&quot;')}" data-lid="${lid}">
        <div class="card-type-badge teal">📄 Lesson</div>
        <div class="card-title">${lbl}</div>
        <div class="card-footer"><span class="card-count">Study now</span><span class="card-arrow">↗</span></div>
      </div>`;
    } else if (isInfo) {
      // Plain text string — show as info card (e.g. Indian Economy text)
      html += `<div class="card info-card" style="grid-column:span 2">
        <div class="card-type-badge amber">ℹ️ Info</div>
        <div class="card-title">${ck}</div>
        <div class="card-info-text">${val.trim()}</div>
      </div>`;
    } else if (isEmpty) {
      html += `<div class="card empty">
        <div class="card-type-badge muted">🚧 Soon</div>
        <div class="card-title">${ck}</div>
        <div class="card-footer"><span class="card-count">Coming soon</span></div>
      </div>`;
    } else {
      html += `<div class="card" data-a="nav" data-key="${key.replace(/"/g,'&quot;')}">
        <div class="card-type-badge ${tagColor}">${tagIcon} ${subLbl}</div>
        <div class="card-title">${ck}</div>
        <div class="card-footer">
          <span class="card-count">${Object.keys(val).length} item${Object.keys(val).length!==1?'s':''} · ${lcount} lesson${lcount!==1?'s':''}</span>
          <span class="card-arrow">→</span>
        </div>
      </div>`;
    }
  }
  html += `</div>`;
  document.getElementById('content').innerHTML = html;

  // Attach events
  document.querySelectorAll('#cardGrid .card[data-a="nav"]').forEach(card => {
    card.onclick = () => {
      const k = card.dataset.key;
      navPush(k, pathStack[pathStack.length-1].obj[k]);
    };
  });
  document.querySelectorAll('#cardGrid .card[data-a="link"]').forEach(card => {
    card.onclick = () => openLesson(card.dataset.href, card.dataset.label, card.dataset.lid);
  });
}

/* ══════════════════════════════
   WELCOME
══════════════════════════════ */

    <div class="welcome-hero">
      <div class="hero-glow">?</div>
      <h1 class="hero-title">Welcome to Missmonk</h1>

      <div class="hero-stats">

        <div class="hero-stat"><div class="hero-stat-val">${total}</div><div class="hero-stat-key">Lessons</div></div>
      </div>

/* ══════════════════════════════
   LESSON MODAL
══════════════════════════════ */
function openLesson(href, label, lid) {
  modalLessonKey   = lid;
  modalLessonHref  = href;
  modalLessonLabel = label;
  document.getElementById('modalTitle').textContent = label;
  document.getElementById('modalFrame').src = href;
  document.getElementById('modalBg').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
  document.getElementById('modalFrame').src = 'about:blank';
  modalLessonKey = null;
}

function shareLesson() {
  if (!modalLessonLabel || !modalLessonHref) return;
  openSharePopup(modalLessonLabel, modalLessonHref, true);
}

document.getElementById('modalBg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ══════════════════════════════
   SIDEBAR MOBILE
══════════════════════════════ */
function toggleSidebar() {
  const sb   = document.getElementById('sidebar');
  const ov   = document.getElementById('sidebarOverlay');
  const open = sb.classList.toggle('open');
  ov.classList.toggle('open', open);
}
function closeSidebarMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

/* ══════════════════════════════
   SEARCH
══════════════════════════════ */
let searchDebounce = null;

function onSearch() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => performSearch(), 120);
  const val = document.getElementById('searchInput').value;
  document.getElementById('searchClear').classList.toggle('show', val.length > 0);
}

function performSearch() {
  const q   = document.getElementById('searchInput').value.trim();
  const box = document.getElementById('searchResults');
  if (!q) { box.classList.remove('open'); return; }

  const ql = q.toLowerCase();
  const scored = allLessons.map(l => {
    const ll = l.label.toLowerCase();
    const pl = l.path.toLowerCase();
    let score = 0;
    if (ll === ql)             score = 100;
    else if (ll.startsWith(ql)) score = 80;
    else if (ll.includes(ql))  score = 60;
    else if (pl.includes(ql))  score = 30;
    return { ...l, score };
  }).filter(l => l.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);

  const exact   = scored.filter(l => l.score >= 80);
  const partial = scored.filter(l => l.score < 80);

  if (scored.length === 0) {
    box.innerHTML = `<div class="sr-empty">No results for "<strong>${q}</strong>"</div>`;
  } else {
    let html = '';
    if (exact.length)   { html += `<div class="sr-section">Best Match</div>`;  html += exact.map(l => srItem(l, q)).join(''); }
    if (partial.length) {
      if (exact.length) html += `<div class="sr-divider"></div>`;
      html += `<div class="sr-section">Related</div>`;
      html += partial.map(l => srItem(l, q)).join('');
    }
    box.innerHTML = html;
    box.querySelectorAll('.sr-item').forEach(el => {
      el.onclick = () => {
        openLesson(el.dataset.href, el.dataset.label, el.dataset.lid);
        box.classList.remove('open');
        clearSearch();
      };
    });
  }
  box.classList.add('open');
}

function srItem(l, q) {
  const lid = lessonId(l.pathArr.slice(0,-1), l.key);
  return `<div class="sr-item" data-href="${l.href}" data-label="${l.label}" data-lid="${lid}">
    <span class="sr-item-icon">📄</span>
    <div class="sr-item-body">
      <div class="sr-item-label">${highlightQuery(l.label, q)}</div>
      <div class="sr-path">${highlightQuery(l.path, q)}</div>
    </div>
  </div>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchClear').classList.remove('show');
}
function showSearch() {
  if (document.getElementById('searchInput').value.trim()) performSearch();
}

/* ══════════════════════════════
   SHARE
══════════════════════════════ */
let shareContext = { title:'', url:'' };

function openSharePopup(title, url, isLesson=false) {
  shareContext = { title, url };
  document.getElementById('shareSubtitle').textContent = isLesson
    ? `Share this lesson with others`
    : `Share "${title}" with others`;
  document.getElementById('shareUrlInput').value = url;
  document.getElementById('sharePopup').classList.add('open');
}
function closeSharePopup() { document.getElementById('sharePopup').classList.remove('open'); }
function handleShareOverlayClick(e) { if (e.target === e.currentTarget) closeSharePopup(); }
function copyShareUrl() {
  const input = document.getElementById('shareUrlInput');
  navigator.clipboard.writeText(input.value).then(() => {
    showToast('📋 Link copied to clipboard!');
    closeSharePopup();
  }).catch(() => {
    input.select();
    document.execCommand('copy');
    showToast('📋 Link copied!');
    closeSharePopup();
  });
}
function shareVia(method) {
  const url   = encodeURIComponent(shareContext.url);
  const title = encodeURIComponent('Missmonk — ' + shareContext.title);
  const text  = encodeURIComponent('Check this out on Missmonk: ' + shareContext.title);
  const links = {
    whatsapp: `https://wa.me/?text=${text}%20${url}`,
    telegram: `https://t.me/share/url?url=${url}&text=${text}`,
    twitter:  `https://twitter.com/intent/tweet?url=${url}&text=${text}`,
    email:    `mailto:?subject=${title}&body=${text}%20${url}`
  };
  if (links[method]) window.open(links[method], '_blank', 'noopener');
  closeSharePopup();
}

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
