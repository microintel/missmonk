<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MissMonk</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#ffffff;
  --ink:#0f172a;
  --muted:#64748b;
  --accent:#3b82f6;
  --card:#ffffff;
}

.dark{
  --bg:#000000;
  --ink:#e2e8f0;
  --muted:#94a3b8;
  --accent:#000;
  --card:#000;
}

*{box-sizing:border-box}
html,body{height:100%}

body{
  margin:0;
  font-family:Poppins,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial,Helvetica,sans-serif;
  color:var(--ink);
  background:var(--bg);
  transition:0.3s ease;
}

header{
display:flex;
justify-content:space-around;
align-items:center;
  max-width:1100px;
  margin:0 auto;
  padding:28px 20px 0;
  letter-spacing:.6rem;
  font-weight:400;
  font-size:42px;
  color:var(--ink);
}
body{
  transition: background-color 0.6s ease, color 0.6s ease;
}


/* Toggle Button */
#themeToggle{
  float:right;
  padding:8px 14px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  font-size:1.6rem;
  background:var(--card);
  color:var(--ink);
}

.section{
  max-width:1100px;
  margin:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.section div{
  flex-grow:1;
}

h1{
  margin:0 0 8px;
  font-size:56px;
}

p{margin:0}

@media (max-width:640px){
  header{font-size:34px; letter-spacing:.5rem}
  h1{font-size:40px}
}

.cd{
  min-width:70px;
  border-radius:1rem;
  box-shadow:0 4px 8px rgba(0,0,0,.15);
  text-align:center;
  padding:10px;
  background:var(--card);
  color:var(--ink);
  transition:.3s;
  border:1px solid var(--muted);
}

.cd:hover{
  transform:scale(1.05);
}

.lg{
  font-size:3rem;
}

a{
  text-decoration:none;
  color:inherit;
}

.cdback{

background-color:var(--ink);
color:var(--bg);

}
#aiBtn{
font-size:2rem;background:none;border:none;
}
i{
color:var(--ink);
font-size:1.7rem;
}

a{

text-decoration:none;
}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

</head>

<body>

<header>
<font>
  Missmonk
  </font>
  <button id="themeToggle">🌙</button>
</header>

<hr>

<h2 id="currentTitle" style="text-align:center; margin:10px; color:var(--muted);">
  Home
</h2>


<section id="par" class="section">

nkn...

</div>




</section>

<p style="text-align:center; margin-top:20px; font-size:14px; color:var(--muted);">
developed by Microintel
</p>

<script>
let currentPath = "";
let parent= document.getElementById("par");
let data;
async function fetchData() {
  try {
    let response = await fetch("https://microintel.github.io/missmonk/data.json");
    data = await response.json(); 
    parent.innerHTML="";
    Object.keys(data).forEach((x)=>{
    let xx= document.createElement("div");
    xx.innerHTML=`
    <div onclick="exchange('${x}')" class="cd">
    <h3>${x}</h3>
    </div>`;
    parent.appendChild(xx);
    
    });
  } catch (error) {
    console.error("Error fetching data:", error);
  }
}

fetchData();


function exchange(path) {
  let keys = path.split("|||");
  let current = data;
currentPath = path;
  keys.forEach(k => {
    current = current[k];
  });

  let title = document.getElementById("currentTitle");
  title.textContent = keys[keys.length - 1];

  parent.innerHTML = "";

  if (keys.length > 0) {
    let backBtn = document.createElement("div");
    backBtn.innerHTML = `
      <div onclick="goBack('${path}')" class="cd cdback">
        <h3>⬅ Back</h3>
      </div>
    `;
    parent.appendChild(backBtn);
  }

  if (typeof current === "object") {
    Object.keys(current).forEach((key) => {
      let div = document.createElement("div");

      div.innerHTML = `
        <div onclick="exchange('${path}|||${key}')" class="cd">
          <h3>${key}</h3>
        </div>
      `;

      parent.appendChild(div);
    });
  } else {
    parent.innerHTML += `
      <div class="cd">
        <h3>Final Value</h3>
        <p>${current}</p>
      </div>
    `;
  }
}



function goBack(path) {
  let arr = path.split("|||");
  arr.pop();

  if (arr.length === 0) {
    document.getElementById("currentTitle").textContent = "Home";
    fetchData();
  } else {
    exchange(arr.join("|||"));
  }
}





const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
const savedTheme = localStorage.getItem("theme");

if (savedTheme === "dark") {
  document.body.classList.add("dark");
  toggleBtn.textContent = "☀️";
}

// Toggle theme
toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    toggleBtn.textContent = "☀️";
  } else {
    localStorage.setItem("theme", "light");
    toggleBtn.textContent = "🌙";
  }
});
</script>

</body>
</html>
