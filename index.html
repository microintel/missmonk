<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Missmonk</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<style>
/* ════════════════════════════════════════════
   THEME TOKENS
════════════════════════════════════════════ */
:root {
  --bg:        #000000;
  --bg2:       #050505;
  --surface:   #0d0d0d;
  --surface2:  #141414;
  --surface3:  #1c1c1c;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --blue:      #5b8def;
  --blue-glow: rgba(91,141,239,0.25);
  --teal:      #5b8def;
  --amber:     #e0b34a;
  --rose:      #e0645f;
  --green:     #4caf7d;
  --text:      #f2f2f2;
  --text2:     #a1a1a1;
  --text3:     #5c5c5c;
  --radius:    14px;
  --radius-lg: 20px;
  --shadow:    0 8px 32px rgba(0,0,0,0.5);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.6);
  --nav-bg:    rgba(0,0,0,0.9);
  --topnav-h:  60px;
}
[data-theme="light"] {
  --bg:        #faf9f6;
  --bg2:       #f2f1ed;
  --surface:   #ffffff;
  --surface2:  #f5f4f0;
  --surface3:  #eae8e2;
  --border:    rgba(0,0,0,0.08);
  --border2:   rgba(0,0,0,0.13);
  --blue:      #3563c9;
  --blue-glow: rgba(53,99,201,0.18);
  --teal:      #3563c9;
  --amber:     #b5790c;
  --rose:      #c23b36;
  --green:     #227a52;
  --text:      #1a1a1a;
  --text2:     #5c5c5c;
  --text3:     #8a8a8a;
  --shadow:    0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --nav-bg:    rgba(250,249,246,0.92);
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'Satoshi',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
  transition:background .3s, color .3s;
}
button { cursor:pointer; font-family:inherit; }
input  { font-family:inherit; }
a { color:inherit; text-decoration:none; }

::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:4px; }



/* ════════════════════════════════════════════
   APP SHELL
════════════════════════════════════════════ */
#appShell { display:flex; flex-direction:column; min-height:100vh; position:relative; z-index:1; }

/* ── TOP NAV ── */
.topnav {
  position:sticky; top:0; z-index:50;
  background:var(--nav-bg);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 1rem;
  height:var(--topnav-h);
  display:flex; align-items:center; gap:.75rem;
}
.nav-logo {
  display:flex; align-items:center; gap:.55rem;
  font-family:'Clash Display',sans-serif;
  font-size:1.1rem; font-weight:700;
  flex-shrink:0;
  color:var(--text);
}
.nav-logo-icon {
  width:30px; height:30px;
  background:var(--blue);
  border-radius:9px;
  display:grid; place-items:center;
  font-size:.9rem; flex-shrink:0;
}
.nav-spacer { flex:1; }

/* Search */
.nav-search {
  position:relative; display:flex; align-items:center;
  flex:0 1 auto; min-width:0;
  width:220px;
  transition:width .45s cubic-bezier(0.22, 1, 0.36, 1);
  will-change:width;
}
.nav-search:hover, .nav-search:focus-within { width:400px; }
.nav-search-input {
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:30px;
  padding:.4rem .9rem .4rem 2.2rem;
  color:var(--text); font-size:.83rem;
  width:100%; outline:none;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  transition:border-color .3s ease, box-shadow .3s ease, background .3s ease;
}
.nav-search-input:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 3px var(--blue-glow);
}
.nav-search-input::placeholder { color:var(--text3); }
.nav-search-icon {
  position:absolute; left:.72rem;
  color:var(--text3); font-size:.85rem; pointer-events:none;
}
.search-clear {
  position:absolute; right:.65rem;
  background:none; border:none; color:var(--text3);
  font-size:.9rem; padding:.1rem; display:none;
  line-height:1;
}
.search-clear.show { display:block; }

/* Nav icon buttons */
.nav-icon-btn {
  background:none; border:none;
  color:var(--text2); font-size:1.1rem;
  padding:.35rem; border-radius:8px;
  transition:background .15s, color .15s;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.nav-icon-btn:hover { background:var(--surface2); color:var(--text); }

/* Hamburger */
.nav-burger {
  display:none; background:none; border:none;
  color:var(--text2); font-size:1.2rem; padding:.35rem;
  border-radius:8px; flex-shrink:0;
  transition:background .15s;
}
.nav-burger:hover { background:var(--surface2); }

/* ── THEME PICKER PANEL ── */
.theme-panel {
  position:fixed; top:0; right:0; bottom:0; z-index:150;
  width:280px; background:var(--surface);
  border-left:1px solid var(--border2);
  box-shadow:-8px 0 40px rgba(0,0,0,0.4);
  padding:1.5rem;
  transform:translateX(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;
}
.theme-panel.open { transform:translateX(0); }
.theme-panel-title {
  font-family:'Clash Display',sans-serif;
  font-size:1rem; font-weight:700; margin-bottom:1.2rem;
  display:flex; align-items:center; justify-content:space-between;
  color:var(--text);
}
.theme-close {
  background:none; border:none; color:var(--text3);
  font-size:1.1rem; cursor:pointer; padding:.2rem; border-radius:6px;
}
.theme-close:hover { color:var(--text); background:var(--surface2); }
.theme-options { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:1.4rem; }
.theme-opt {
  border:2px solid var(--border);
  border-radius:var(--radius);
  padding:.75rem .6rem;
  cursor:pointer; text-align:center;
  transition:border-color .2s, transform .15s;
  background:var(--surface2);
}
.theme-opt:hover { transform:translateY(-2px); border-color:var(--border2); }
.theme-opt.active { border-color:var(--blue); }
.theme-opt-swatch {
  display:flex; gap:3px; justify-content:center;
  margin-bottom:.4rem;
}
.swatch-dot { width:14px; height:14px; border-radius:50%; }
.theme-opt-name { font-size:.73rem; font-weight:600; color:var(--text2); }
.theme-divider { border:none; border-top:1px solid var(--border); margin:.8rem 0; }
.theme-section-lbl {
  font-size:.7rem; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--text3); margin-bottom:.6rem;
}
.url-form { display:flex; flex-direction:column; gap:.55rem; }
.url-input {
  width:100%; padding:.6rem .85rem;
  background:var(--bg);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--text); font-size:.8rem;
  outline:none; font-family:inherit;
  transition:border-color .2s;
}
.url-input:focus { border-color:var(--blue); }
.url-input::placeholder { color:var(--text3); }
.btn-sm {
  padding:.5rem .85rem;
  background:var(--blue);
  border:none; border-radius:10px;
  color:#fff; font-size:.8rem; font-weight:700;
  cursor:pointer; transition:opacity .15s, transform .15s;
}
.btn-sm:hover { opacity:.85; transform:translateY(-1px); }
.btn-sm.secondary { background:var(--surface3); color:var(--text2); }
.btn-sm.secondary:hover { color:var(--text); }
.url-status {
  font-size:.75rem; padding:.4rem .65rem;
  border-radius:8px; display:none;
}
.url-status.ok  { display:block; background:rgba(34,197,94,0.12); color:var(--green); border:1px solid rgba(34,197,94,.25); }
.url-status.err { display:block; background:rgba(244,63,94,0.12); color:var(--rose); border:1px solid rgba(244,63,94,.25); }
.url-status.loading { display:block; background:rgba(59,130,246,0.1); color:var(--blue); border:1px solid rgba(59,130,246,.2); }

/* ── MAIN LAYOUT ── */
.shell-body { display:flex; flex:1; overflow:hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width:256px; flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
  transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sidebar-inner { flex:1; overflow-y:auto; padding:1rem .75rem; }
.sidebar-section-label {
  font-size:.65rem; font-weight:700;
  letter-spacing:.14em; text-transform:uppercase;
  color:var(--text3); padding:.3rem .7rem .6rem;
}
.course-item {
  display:flex; align-items:center; gap:.7rem;
  padding:.6rem .7rem;
  border-radius:var(--radius);
  cursor:pointer;
  transition:background .15s, color .15s;
  color:var(--text2); font-size:.88rem; font-weight:500;
  margin-bottom:.15rem;
  border:1.5px solid transparent;
}
.course-item:hover { background:var(--surface); color:var(--text); }
.course-item.active {
  background:rgba(91,141,239,.12);
  border-color:rgba(91,141,239,.3);
  color:var(--blue);
}
.course-emoji {
  width:32px; height:32px; border-radius:9px;
  background:var(--surface2);
  display:grid; place-items:center;
  font-size:.95rem; flex-shrink:0;
  transition:background .15s;
}
.course-item.active .course-emoji { background:rgba(59,130,246,.15); }
.course-info { flex:1; min-width:0; }
.course-name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:.87rem; }
.course-count { font-size:.68rem; color:var(--text3); font-weight:400; margin-top:1px; }

/* Sidebar footer branding */
.sidebar-footer {
  padding:.85rem 1rem;
  border-top:1px solid var(--border);
  flex-shrink:0;
}
.sidebar-brand {
  font-size:.68rem; color:var(--text3); text-align:center; line-height:1.5;
}
.sidebar-brand strong { color:var(--text2); }

/* Mobile overlay */
.sidebar-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.6); z-index:39;
  backdrop-filter:blur(3px);
}

/* ── CONTENT AREA ── */
.content {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:1.8rem 1.8rem 3rem;
  min-width:0;
}

/* ── WELCOME HERO ── */
.welcome-hero {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:55vh;
  text-align:center; gap:1rem;
  animation:fadeUp .5s ease both;
}
.hero-glow {
  width:88px; height:88px; border-radius:28px;
  background:var(--blue);
  display:grid; place-items:center; font-size:2.2rem;
  box-shadow:0 0 60px var(--blue-glow);
  margin-bottom:.5rem;
}
.hero-title {
  font-family:'Clash Display',sans-serif;
  font-size:2rem; font-weight:700;
  color:var(--text);
}
.hero-sub { color:var(--text2); font-size:.93rem; max-width:480px; line-height:1.7; font-weight:300; }
.hero-sub strong { color:var(--text); font-weight:700; }
.hero-about {
  color:var(--text3); font-size:.78rem; max-width:400px; line-height:1.6;
  margin-top:1.4rem; padding-top:1.1rem; border-top:1px solid var(--border);
}
.hero-about a { color:var(--blue); font-weight:600; white-space:nowrap; }
.hero-about a:hover { text-decoration:underline; }
.hero-stats {
  display:flex; gap:1.2rem; margin-top:.5rem; flex-wrap:wrap; justify-content:center;
}
.hero-stat {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:.65rem 1.1rem;
  text-align:center; min-width:85px;
}
.hero-stat-val {
  font-family:'Clash Display',sans-serif;
  font-size:1.35rem; font-weight:700; color:var(--blue);
}
.hero-stat-key { font-size:.68rem; color:var(--text3); margin-top:1px; }

/* Dev credit */
.dev-credit {
  text-align:center; font-size:.72rem; color:var(--text3);
  margin-top:1.5rem; letter-spacing:.03em;
}
.dev-credit strong { color:var(--blue); }

/* ── BREADCRUMB ── */
.breadcrumb {
  display:flex; align-items:center; gap:.25rem;
  flex-wrap:wrap; margin-bottom:1.3rem;
  font-size:.78rem;
}
.crumb {
  color:var(--text3); cursor:pointer;
  padding:.18rem .38rem; border-radius:6px;
  transition:color .15s, background .15s; font-weight:400;
}
.crumb:hover { color:var(--blue); background:rgba(59,130,246,.08); }
.crumb.active { color:var(--text); cursor:default; font-weight:500; }
.crumb-sep { color:var(--text3); font-size:.7rem; }

/* ── PAGE HEADER ── */
.page-header { margin-bottom:1.5rem; }
.page-tag {
  display:inline-flex; align-items:center; gap:.35rem;
  font-size:.67rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
  padding:.26rem .62rem; border-radius:6px;
  background:rgba(59,130,246,.12); color:var(--blue);
  margin-bottom:.55rem;
}
.page-tag.teal  { background:rgba(45,212,191,.12); color:var(--teal); }
.page-tag.amber { background:rgba(245,158,11,.12); color:var(--amber); }
.page-title {
  font-family:'Clash Display',sans-serif;
  font-size:1.65rem; font-weight:700; line-height:1.2; margin-bottom:.25rem;
  color:var(--text);
}
.page-meta { font-size:.8rem; color:var(--text2); font-weight:300; }
.page-header-row {
  display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;
}
.share-btn {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:.45rem .8rem;
  font-size:.78rem; color:var(--text2);
  display:flex; align-items:center; gap:.4rem;
  transition:background .15s, color .15s, border-color .15s;
  flex-shrink:0;
}
.share-btn:hover { background:var(--surface3); color:var(--text); border-color:var(--border2); }

/* depth progress */
.depth-prog { height:2px; background:var(--border); border-radius:1px; margin-bottom:1.5rem; overflow:hidden; }
.depth-fill { height:100%; background:var(--blue); border-radius:1px; transition:width .4s ease; }

/* ── CARD GRID ── */
.card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:.9rem;
}

/* ── CARD ── */
.card {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius-lg);
  padding:1.2rem 1.1rem 1rem;
  cursor:pointer; position:relative; overflow:hidden;
  transition:transform .22s cubic-bezier(.4,0,.2,1),
             border-color .22s, box-shadow .22s;
  animation:fadeUp .35s ease both;
  display:flex; flex-direction:column; gap:.45rem;
}
.card:hover { transform:translateY(-3px); border-color:rgba(91,141,239,.4); box-shadow:0 10px 30px rgba(91,141,239,.12); }
.card.empty { opacity:.5; cursor:default; }
.card.empty:hover { transform:none; border-color:var(--border); box-shadow:none; }

.card-type-badge {
  display:inline-flex; align-items:center; gap:.3rem;
  font-size:.62rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
  padding:.2rem .52rem; border-radius:5px;
  background:rgba(59,130,246,.12); color:var(--blue);
  width:fit-content;
}
.card-type-badge.teal  { background:rgba(45,212,191,.12); color:var(--teal); }
.card-type-badge.amber { background:rgba(245,158,11,.12); color:var(--amber); }
.card-type-badge.muted { background:var(--surface3); color:var(--text3); }
.card-type-badge.rose  { background:rgba(244,63,94,.12); color:var(--rose); }

.card-title {
  font-family:'Clash Display',sans-serif;
  font-size:.94rem; font-weight:600;
  line-height:1.35; color:var(--text);
}
.card-footer {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:auto; padding-top:.25rem;
}
.card-count { font-size:.71rem; color:var(--text3); font-weight:400; }
.card-arrow { color:var(--text3); font-size:1rem; transition:transform .2s, color .2s; }
.card:not(.empty):hover .card-arrow { color:var(--blue); transform:translate(2px,-2px); }

.card.link-card {
  border-color:rgba(91,141,239,.25);
  background:var(--surface);
}
.card.link-card:hover { border-color:rgba(91,141,239,.5); box-shadow:0 10px 30px rgba(91,141,239,.1); }

/* Info card — plain text values */
.card.info-card {
  border-color:rgba(224,179,74,.2);
  background:var(--surface);
  cursor:default;
}
.card.info-card:hover {
  transform:none;
  border-color:rgba(245,158,11,.38);
  box-shadow:0 6px 20px rgba(245,158,11,.08);
}
.card.info-card:hover::after { opacity:0; }
.card-info-text {
  font-size:.8rem; color:var(--text2);
  line-height:1.6; word-break:break-word;
  margin-top:.1rem;
}

/* ── BOOK CARD (cover + author, no ratings) ── */
.book-list {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(165px,1fr));
  gap:1.6rem;
}
.card.book-card {
  flex-direction:row; align-items:flex-start; gap:1rem;
  padding:1rem;
}
.book-list .card.book-card {
  width:100%;
  flex-direction:column; align-items:stretch; gap:.75rem;
  padding:.9rem;
}
.book-cover-wrap {
  width:76px; height:112px; flex-shrink:0;
  border-radius:8px; overflow:hidden;
  background:var(--surface3);
  box-shadow:0 6px 18px rgba(0,0,0,.35);
  display:flex; align-items:center; justify-content:center;
}
.book-list .book-cover-wrap {
  width:100%; height:auto; aspect-ratio:2/3;
  border-radius:12px;
  box-shadow:0 12px 30px rgba(0,0,0,.4);
}
.book-cover-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.book-cover-ph { font-size:1.8rem; opacity:.6; }
.book-list .book-cover-ph { font-size:2.6rem; }
.book-card-body {
  flex:1; min-width:0; display:flex; flex-direction:column; gap:.35rem;
  align-self:stretch;
}
.book-card-author { font-size:.8rem; color:var(--text2); font-weight:400; }
.card.book-card .card-footer { margin-top:auto; }

/* ── ACCOUNT PAGE ── */
.account-card {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius-lg);
  padding:1.1rem 1.2rem;
  margin-bottom:1rem;
}
.account-card-title {
  font-family:'Clash Display',sans-serif;
  font-size:.95rem; font-weight:700; margin-bottom:.8rem; color:var(--text);
}
.account-form { display:flex; flex-direction:column; gap:.6rem; max-width:340px; }
.about-roadmap-lbl {
  font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:var(--text3); margin-top:1.1rem; margin-bottom:.6rem;
}
.about-roadmap {
  list-style:none; display:flex; flex-direction:column; gap:.55rem;
}
.about-roadmap li {
  display:flex; align-items:flex-start; gap:.55rem;
  font-size:.82rem; color:var(--text2); line-height:1.5;
}
.about-roadmap li i {
  color:var(--blue); font-size:.85rem; margin-top:.2rem; flex-shrink:0;
}

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav { display:none; }

/* Search highlight */
.highlight { background:var(--blue-glow); border-radius:3px; padding:0 2px; color:var(--blue); font-weight:600; }

/* ── EMPTY STATE ── */
.empty-state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:4rem 2rem; text-align:center; gap:.7rem;
  color:var(--text3);
}
.empty-state .ei { font-size:2.5rem; opacity:.35; }
.empty-state h3 { font-family:'Clash Display',sans-serif; font-size:1rem; color:var(--text2); }
.empty-state p  { font-size:.8rem; max-width:260px; line-height:1.6; }

/* ── MODAL ── */
.modal-backdrop {
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(0,0,0,.85); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; padding:1rem;
}
.modal-backdrop.open { display:flex; }
.modal-box {
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:24px;
  width:100%; max-width:900px;
  height:85vh; max-height:720px;

<!-- ══════════════════════════════════
     JAVASCRIPT
══════════════════════════════════ -->
<script>
/* ══════════════════════════════
   BUILT-IN CURRICULUM DATA
══════════════════════════════ */
const BUILT_IN_CURRICULUM = {
  "diploma": {
    "sem1": {
      "engineering mathematics": {
        "matrix and determinants": {
          "matrix & types": '<a href="https://microintel.github.io/missmonk/diploma/sem1/maths/matrix/matrix&types.html">Matrix & Types</a>'
        }
      },
      "Fundamentals of Computer": {
        "BASICS OF LOGIC DESIGN": {
          "Introduction to number system": {
            "Binary, Octal, Decimal, Hexadecimal": {}
          }
        },
        "LOGIC CIRCUITS": {},
        "INTRODUCTION TO COMPUTER CONCEPTS": {},
        "INTRODUCTION TO COMPUTER ORGANIZATION & OPERATING SYSTEM": {},
        "INTRODUCTION TO COMPUTER PROGRAMMING": {}
      },
      "Fundamentals of Electrical and Electronics Engineering": {},
      "IT Skills": {},
      "Environmental Sustainability": {}
    },
    "sem2": {}, "sem3": {}, "sem4": {}, "sem5": {}, "sem6": {}
  },
  "engineering": {},
  "Financial": {
    "Stock Market": {
      "Stock Market": {
        "Basics of Stock Market": { "Role of Stock Market": {} },
        "How Stock Prices Move?": {},
        "Set-up your Trading System": {}
      },
      "Stock Research": {},
      "Evaluating Companies": {},
      "Valuation of Stocks": {},
      "When to Buy & When to Sell?": {},
      "Managing a Portfolio": {},
      "How to Grow your Money?": {}
    }
  }
};

const COURSE_META = {
  diploma:     { icon:'<i class="bi bi-triangle-fill"></i>', color:'blue',  label:'Diploma' },
  engineering: { icon:'<i class="bi bi-gear-fill"></i>', color:'amber', label:'Engineering' },
  Financial:   { icon:'<i class="bi bi-graph-up-arrow"></i>', color:'teal',  label:'Financial' },
};

/* ══════════════════════════════
   STATE
══════════════════════════════ */
let CURRICULUM    = JSON.parse(JSON.stringify(BUILT_IN_CURRICULUM));
let BOOK_META     = {};
let currentView   = 'home'; // 'home' | 'books' | 'account'
let pathStack     = [];
let currentCourse = null;
let modalLessonKey   = null;
let modalLessonHref  = null;
let modalLessonLabel = null;
let allLessons    = [];
let allSearchItems = [];

/* ══════════════════════════════
   THEME
══════════════════════════════ */
function applyTheme(theme) {
  if (theme === 'dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-opt').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === theme);
  });
  localStorage.setItem('lp_theme', theme);
}
function toggleThemePanel() { document.getElementById('themePanel').classList.toggle('open'); }
function closeThemePanel()  { document.getElementById('themePanel').classList.remove('open'); }

/* ══════════════════════════════
   URL FETCH
══════════════════════════════ */
const CURRICULUM_CACHE_KEY = 'lp_curriculum_cache';
const CURRICULUM_CACHE_TTL = 15 * 60 * 1000; // 15 min — long enough to skip repeat fetches, short enough to stay fresh

function readCurriculumCache(url) {
  try {
    const raw = localStorage.getItem(CURRICULUM_CACHE_KEY);
    if (!raw) return null;
    const entry = JSON.parse(raw);
    if (entry.url !== url) return null;
    return entry; // { url, data, ts }
  } catch (e) { return null; }
}
function writeCurriculumCache(url, data) {
  try {
    localStorage.setItem(CURRICULUM_CACHE_KEY, JSON.stringify({ url, data, ts: Date.now() }));
  } catch (e) { /* storage full/unavailable — safe to skip caching */ }
}

function applyCurriculumData(data, sourceLabel) {
  const parsed = parseCurriculumData(data);
  if (!parsed) throw new Error('Invalid curriculum format');
  CURRICULUM = parsed;
  BOOK_META = (CURRICULUM._bookMeta && typeof CURRICULUM._bookMeta === 'object') ? CURRICULUM._bookMeta : {};
  allLessons = [];
  buildLessonIndex(CURRICULUM, []);
  buildAll();
  if (currentCourse && !CURRICULUM[currentCourse]) { currentCourse = null; pathStack = []; }
  if (currentCourse) renderContent(); else showWelcome();
  setUrlStatus('ok', `<i class="bi bi-check-circle-fill"></i> Loaded ${Object.keys(CURRICULUM).filter(k=>!k.startsWith('_')).length} course(s)${sourceLabel ? ' ' + sourceLabel : ''}`);
}

async function fetchFromUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { setUrlStatus('err', 'Please enter a URL.'); return; }

  // Serve instantly from cache if we have a fresh-enough copy, so most loads
  // need zero network round trips for the curriculum itself.
  const cached = readCurriculumCache(url);
  if (cached) {
    try {
      applyCurriculumData(cached.data, '(cached)');
      showToast('<i class="bi bi-check-circle-fill"></i> Curriculum loaded!');
    } catch (e) { /* fall through to network fetch below */ }
    if (Date.now() - cached.ts < CURRICULUM_CACHE_TTL) return; // still fresh, skip network entirely
  }

  if (!cached) setUrlStatus('loading', '<i class="bi bi-hourglass-split"></i> Fetching…');
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    writeCurriculumCache(url, data);
    applyCurriculumData(data);
    if (!cached) showToast('<i class="bi bi-check-circle-fill"></i> Curriculum loaded!');
  } catch(e) {
    if (!cached) {
      setUrlStatus('err', '<i class="bi bi-x-circle-fill"></i> ' + e.message);
      showWelcome();
    }
    // if cached data is already showing, a background refresh failure is silent
  }
}

function parseCurriculumData(data) {
  if (!data || typeof data !== 'object') return null;
  if (Array.isArray(data)) {
    const result = {};
    for (const item of data) {
      if (!item.name) continue;
      if (item.url)      result[item.name] = `<a href="${item.url}">${item.name}</a>`;
      else if (item.children) result[item.name] = parseCurriculumData(item.children) || {};
      else result[item.name] = {};
    }
    return result;
  }
  return data;
}

function setUrlStatus(type, msg) {
  const el = document.getElementById('urlStatus');
  el.className = 'url-status ' + type;
  el.innerHTML = msg;
}

function resetToBuiltIn() {
  try { localStorage.removeItem(CURRICULUM_CACHE_KEY); } catch (e) {}

/* ══════════════════════════════
   LESSON INDEX
══════════════════════════════ */
function buildLessonIndex(obj, path) {
  if (typeof obj !== 'object' || obj === null) return;
  for (const key of Object.keys(obj)) {
    if (key.startsWith('_')) continue;
    const val = obj[key];
    const p   = [...path, key];
    if (typeof val === 'string' && extractHref(val)) {
      allLessons.push({
        key, label: extractText(val) || cleanKey(key),
        href: extractHref(val), path: p.join(' › '),
        pathArr: p
      });
    } else {
      buildLessonIndex(val, p);
    }
  }
}

/* ══════════════════════════════
   UTILS
══════════════════════════════ */
function extractHref(s) {
  if (typeof s !== 'string') return null;
  const m = s.match(/href="([^"]+)"/);
  return m ? m[1] : (s.startsWith('http') ? s : null);
}
function extractText(s) {
  if (typeof s !== 'string') return null;
  const m = s.match(/>([^<]+)</);
  return m ? m[1].trim() : null;
}
function countDeep(obj) {
  if (!obj || typeof obj !== 'object') return 0;
  const ks = Object.keys(obj);
  return ks.length + ks.reduce((a, k) => a + countDeep(obj[k]), 0);
}
function countLessons(obj) {
  if (typeof obj === 'string') return extractHref(obj) ? 1 : 0;
  if (!obj || typeof obj !== 'object') return 0;
  return Object.values(obj).reduce((a, v) => a + countLessons(v), 0);
}
function cleanKey(k) { return String(k).replace(/\t/g,' ').replace(/\s+/g,' ').trim(); }
function lessonId(path, key) { return btoa(encodeURIComponent([...path, key].join('|'))).replace(/=/g,''); }
function highlightQuery(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp('(' + esc + ')', 'gi'), '<span class="highlight">$1</span>');
}

/* ══════════════════════════════
   SEARCH INDEX (everything: courses, topics, books, lessons)
══════════════════════════════ */
function buildSearchIndex() {
  allSearchItems = [];
  Object.keys(CURRICULUM).filter(k => !k.startsWith('_')).forEach(course => {
    const courseStack = [{ key: cleanKey(course), obj: CURRICULUM[course] }];
    const cMeta = COURSE_META[course] || { label: cleanKey(course) };
    allSearchItems.push({
      type: 'course', label: cleanKey(course), path: cleanKey(course),
      course, stack: courseStack
    });

    const walk = (obj, stack) => {
      if (!obj || typeof obj !== 'object') return;
      Object.keys(obj).forEach(key => {
        if (key.startsWith('_')) return;
        const val = obj[key];
        const newStack = [...stack, { key: cleanKey(key), obj: val }];
        const pathLabel = newStack.map(s => s.key).join(' › ');

        if (typeof val === 'string' && extractHref(val)) {
          allSearchItems.push({
            type: 'lesson', label: extractText(val) || cleanKey(key),
            path: pathLabel, href: extractHref(val),
            course, stack, key
          });
        } else if (val && typeof val === 'object') {
          const meta = BOOK_META[key] || BOOK_META[cleanKey(key)];
          if (meta) {
            allSearchItems.push({
              type: 'book', label: cleanKey(key), path: pathLabel,
              author: meta.author || '', course, stack: newStack,
              lcount: countLessons(val)
            });
          } else {
            allSearchItems.push({
              type: 'folder', label: cleanKey(key), path: pathLabel,
              course, stack: newStack, lcount: countLessons(val)
            });
          }
          walk(val, newStack);
        }
      });
    };
    walk(CURRICULUM[course], courseStack);
  });
}

function selectCourse(course) {
  currentCourse = course;
  pathStack     = [{ key: cleanKey(course), obj: CURRICULUM[course] }];
  document.querySelectorAll('.course-item').forEach(el => el.classList.remove('active'));
  const si = document.getElementById('si-' + CSS.escape(course));
  if (si) si.classList.add('active');
  renderContent();
  closeSidebarMobile();
}
function navPush(key, obj) {
  pathStack.push({ key: cleanKey(key), obj });
  renderContent();
}
function navTo(idx) {
  pathStack = pathStack.slice(0, idx + 1);
  renderContent();
}

/* ══════════════════════════════
   SHAREABLE DEEP LINKS
   (?course=<key>&path=<label1>|<label2>|...)
══════════════════════════════ */
function buildShareUrl() {
  const params = new URLSearchParams();
  if (currentCourse) {
    params.set('course', currentCourse);
    const segments = pathStack.slice(1).map(p => p.key);
    if (segments.length) params.set('path', segments.join('|'));
  }
  const base = window.location.origin + window.location.pathname;
  const qs = params.toString();
  return qs ? `${base}?${qs}` : base;
}

function handleSharedUrl() {
  const params = new URLSearchParams(window.location.search);
  const course = params.get('course');
  if (!course) return; // nothing shared, normal home view

  if (!CURRICULUM[course]) { showWrongPath(); return; }

  let obj   = CURRICULUM[course];
  let stack = [{ key: cleanKey(course), obj }];
  const rawPath = params.get('path');
  const segments = rawPath ? rawPath.split('|').filter(Boolean) : [];

  for (const seg of segments) {
    if (typeof obj !== 'object' || obj === null) { showWrongPath(); return; }
    const matchKey = Object.keys(obj).find(k => !k.startsWith('_') && cleanKey(k) === seg);
    if (!matchKey) { showWrongPath(); return; }
    obj = obj[matchKey];
    stack.push({ key: cleanKey(matchKey), obj });
  }

  currentCourse = course;
  pathStack     = stack;
  document.querySelectorAll('.course-item').forEach(el => el.classList.remove('active'));
  const si = document.getElementById('si-' + CSS.escape(course));
  if (si) si.classList.add('active');
  renderContent();
}

function showWrongPath() {

      <h1 class="hero-title">Wrong Path</h1>

}

/* ══════════════════════════════
   RENDER CONTENT
══════════════════════════════ */
function renderContent() {
  currentView = 'home';
  setBottomNavActive('home');
  if (!currentCourse) { showWelcome(); return; }
  const cur      = pathStack[pathStack.length - 1];
  const obj      = cur.obj;
  const depth    = pathStack.length - 1;
  const depthLabels = ['', 'Semester', 'Subject', 'Chapter', 'Topic', 'Subtopic'];
  const childLabel  = depthLabels[depth] || 'Item';
  const meta        = COURSE_META[currentCourse] || { color:'blue' };

  // Breadcrumb
  const crumbs = pathStack.map((p, i) => {
    const isLast = i === pathStack.length - 1;
    return `<span class="crumb${isLast?' active':''}" ${!isLast?`onclick="navTo(${i})"`:''} >${p.key}</span>`;
  }).join('<span class="crumb-sep"> › </span>');

  const childCount = typeof obj === 'object' && obj !== null ? Object.keys(obj).length : 0;
  const pct = Math.min((depth / 5) * 100, 100);

  const topicPath    = pathStack.map(p => p.key).join(' › ');

  let html = `
    <div class="breadcrumb">${crumbs}</div>
    <div class="depth-prog"><div class="depth-fill" style="width:${pct}%"></div></div>
    <div class="page-header">
      <div class="page-header-row">
        <div>
          <div class="page-tag ${meta.color}">${COURSE_META[currentCourse]?.icon||'<i class="bi bi-collection-fill"></i>'} ${childLabel||'Course'}</div>
          <div class="page-title">${cur.key}</div>
          <div class="page-meta">${childCount} item${childCount!==1?'s':''} · ${countDeep(obj)} total · ${countLessons(obj)} lesson${countLessons(obj)!==1?'s':''}</div>
        </div>
        <button class="share-btn" onclick="openSharePopup('${topicPath.replace(/'/g,"\\'")}', '${buildShareUrl().replace(/'/g,"\\'")}')"><i class="bi bi-share-fill"></i> <span>Share</span></button>
      </div>
    </div>`;

  // String leaf
  if (typeof obj === 'string') {
    const href  = extractHref(obj);
    if (href) {
      const label = extractText(obj) || cur.key;
      const lid   = lessonId(pathStack.slice(0,-1).map(p=>p.key), cur.key);
      html += `
        <div class="card-grid">
          <div class="card link-card" onclick="openLesson('${href}','${label}','${lid}')">
            <div class="card-type-badge teal"><i class="bi bi-file-earmark-text-fill"></i> Lesson</div>
            <div class="card-title">${label}</div>
            <div class="card-footer"><span class="card-count">Click to study</span><span class="card-arrow">↗</span></div>
          </div>
        </div>`;
    } else {
      // Plain text info value
      html += `
        <div class="card-grid">
          <div class="card info-card" style="grid-column:1/-1">
            <div class="card-type-badge amber"><i class="bi bi-info-circle-fill"></i> Info</div>
            <div class="card-title">${cur.key}</div>
            <div class="card-info-text">${obj.trim()}</div>
          </div>
        </div>`;
    }
    document.getElementById('content').innerHTML = html;
    return;
  }

  if (!obj || typeof obj !== 'object') {
    html += `<div class="empty-state"><div class="ei"><i class="bi bi-cone-striped"></i></div><h3>Coming Soon</h3><p>Content will be added soon.</p></div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  const keys = Object.keys(obj);
  if (keys.length === 0) {
    html += `<div class="empty-state"><div class="ei"><i class="bi bi-cone-striped"></i></div><h3>Content Coming Soon</h3><p>This section is being built. Check back later!</p></div>`;
    document.getElementById('content').innerHTML = html;
    return;
  }

  html += `<div class="card-grid" id="cardGrid">`;
  for (const key of keys) {
    const val    = obj[key];
    const ck     = cleanKey(key);
    const isLink = typeof val === 'string' && extractHref(val);
    const isInfo = typeof val === 'string' && !extractHref(val);
    const href   = isLink ? extractHref(val) : null;
    const lbl    = isLink ? (extractText(val)||ck) : ck;
    const isEmpty= !isLink && !isInfo && (typeof val !== 'object' || val === null || Object.keys(val).length === 0);
    const deep   = countDeep(val);
    const lcount = countLessons(val);
    const lid    = isLink ? lessonId(pathStack.map(p=>p.key), key) : null;
    const bookMeta = (!isLink && !isInfo) ? (BOOK_META[key] || BOOK_META[ck]) : null;

    const tagColor = depth === 0 ? 'blue' : depth === 1 ? 'amber' : 'teal';
    const tagIcon  = depth === 0 ? '<i class="bi bi-calendar3"></i>' : depth === 1 ? '<i class="bi bi-journal-bookmark-fill"></i>' : depth === 2 ? '<i class="bi bi-book-half"></i>' : '<i class="bi bi-bookmark-fill"></i>';
    const subLbl   = depth === 0 ? 'Semester' : depth === 1 ? 'Subject' : depth === 2 ? 'Chapter' : 'Topic';

    if (isLink) {
      html += `<div class="card link-card" data-a="link" data-href="${href}" data-label="${lbl.replace(/"/g,'&quot;')}" data-lid="${lid}">
        <div class="card-type-badge teal"><i class="bi bi-file-earmark-text-fill"></i> Lesson</div>
        <div class="card-title">${lbl}</div>
        <div class="card-footer"><span class="card-count">Study now</span><span class="card-arrow">↗</span></div>
      </div>`;
    } else if (isInfo) {
      // Plain text string — show as info card (e.g. Indian Economy text)
      html += `<div class="card info-card" style="grid-column:span 2">
        <div class="card-type-badge amber"><i class="bi bi-info-circle-fill"></i> Info</div>
        <div class="card-title">${ck}</div>
        <div class="card-info-text">${val.trim()}</div>
      </div>`;
    } else if (bookMeta) {
      html += bookCardHTML(key, bookMeta, lcount);
    } else if (isEmpty) {
      html += `<div class="card empty">
        <div class="card-type-badge muted"><i class="bi bi-cone-striped"></i> Soon</div>
        <div class="card-title">${ck}</div>
        <div class="card-footer"><span class="card-count">Coming soon</span></div>
      </div>`;
    } else {
      html += `<div class="card" data-a="nav" data-key="${key.replace(/"/g,'&quot;')}">
        <div class="card-type-badge ${tagColor}">${tagIcon} ${subLbl}</div>
        <div class="card-title">${ck}</div>
        <div class="card-footer">
          <span class="card-count">${Object.keys(val).length} item${Object.keys(val).length!==1?'s':''} · ${lcount} lesson${lcount!==1?'s':''}</span>
          <span class="card-arrow">→</span>
        </div>
      </div>`;
    }
  }
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
  attachBookCovers(document.getElementById('cardGrid'));

  // Attach events
  document.querySelectorAll('#cardGrid .card[data-a="nav"]').forEach(card => {
    card.onclick = () => {
      const k = card.dataset.key;
      navPush(k, pathStack[pathStack.length-1].obj[k]);
    };
  });
  document.querySelectorAll('#cardGrid .card[data-a="link"]').forEach(card => {
    card.onclick = () => openLesson(card.dataset.href, card.dataset.label, card.dataset.lid);
  });
}

/* ══════════════════════════════
   BOOK CARDS + COVER LOOKUP
══════════════════════════════ */
function bookCardHTML(key, meta, lcount) {
  const ck = cleanKey(key);
  return `<div class="card book-card" data-a="nav" data-key="${String(key).replace(/"/g,'&quot;')}">
    <div class="book-cover-wrap" data-cover-title="${ck.replace(/"/g,'&quot;')}"><div class="book-cover-ph"><i class="bi bi-book-fill"></i></div></div>
    <div class="book-card-body">
      <div class="card-title">${ck}</div>
      <div class="book-card-author">by ${meta.author || 'Unknown author'}</div>
      <div class="card-footer"><span class="card-count">${lcount} lesson${lcount!==1?'s':''}</span><span class="card-arrow">→</span></div>
    </div>
  </div>`;
}

function attachBookCovers(root) {
  const scope = root || document;
  if (!scope) return;
  scope.querySelectorAll('.book-cover-wrap[data-cover-title]').forEach(el => {
    loadCoverInto(el, el.dataset.coverTitle);
  });
}

const coverCache = {};
async function loadCoverInto(el, title) {
  try {
    let url = coverCache[title];
    if (url === undefined) {
      const cached = localStorage.getItem('lp_cover_' + title);
      if (cached !== null) {
        url = cached === 'null' ? null : cached;
      } else {
        const res  = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&limit=1&fields=cover_i`);
        const data = await res.json();
        const coverId = data && data.docs && data.docs[0] ? data.docs[0].cover_i : null;
        url = coverId ? `https://covers.openlibrary.org/b/id/${coverId}-L.jpg` : null;
        localStorage.setItem('lp_cover_' + title, url || 'null');
      }
      coverCache[title] = url;
    }
    if (url && el.isConnected) {
      el.innerHTML = `<img src="${url}" alt="${title}" loading="lazy" onerror="this.parentElement.innerHTML='&lt;div class=&quot;book-cover-ph&quot;&gt;&lt;i class=&quot;bi bi-book-fill&quot;&gt;&lt;/i&gt;&lt;/div&gt;'"/>`;
    }
  } catch (e) { /* keep placeholder icon on failure */ }
}

/* ══════════════════════════════
   FIND BOOK NODES (for Books tab)
══════════════════════════════ */
function findBookNodes() {
  const results = [];
  Object.keys(CURRICULUM).filter(k => !k.startsWith('_')).forEach(course => {
    const walk = (obj, stack) => {
      if (!obj || typeof obj !== 'object') return;
      Object.keys(obj).forEach(key => {
        const val  = obj[key];
        const meta = BOOK_META[key] || BOOK_META[cleanKey(key)];
        const newStack = [...stack, { key: cleanKey(key), obj: val }];
        if (meta && val && typeof val === 'object') {
          results.push({ course, key, meta, pathStack: newStack, lcount: countLessons(val) });
        }
        if (val && typeof val === 'object') walk(val, newStack);
      });
    };
    walk(CURRICULUM[course], [{ key: cleanKey(course), obj: CURRICULUM[course] }]);
  });
  return results;
}

function navigateToStack(course, stack) {
  currentCourse = course;
  pathStack     = stack;
  currentView   = 'home';
  setBottomNavActive('home');
  document.querySelectorAll('.course-item').forEach(el => el.classList.remove('active'));
  const si = document.getElementById('si-' + CSS.escape(course));
  if (si) si.classList.add('active');
  renderContent();
  closeSidebarMobile();
}

function openBookNode(node) {
  navigateToStack(node.course, node.pathStack);
}

/* ══════════════════════════════
   SEARCH
══════════════════════════════ */
let searchDebounce = null;

function onSearch() {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => performSearch(), 120);
  const val = document.getElementById('searchInput').value;
  document.getElementById('searchClear').classList.toggle('show', val.length > 0);
}

let lastSearchResults = [];

function performSearch() {
  const q   = document.getElementById('searchInput').value.trim();
  const box = document.getElementById('searchResults');
  if (!q) { box.classList.remove('open'); return; }

  const ql = q.toLowerCase();
  const scored = allSearchItems.map(item => {
    const ll = item.label.toLowerCase();
    const pl = item.path.toLowerCase();
    const al = (item.author || '').toLowerCase();
    let score = 0;
    if (ll === ql)              score = 100;
    else if (ll.startsWith(ql)) score = 80;
    else if (ll.includes(ql))   score = 60;
    else if (al && al.includes(ql)) score = 50;
    else if (pl.includes(ql))   score = 30;
    // Slight boost so specific content (lessons/books) ranks above broad folders/courses on ties
    if (score > 0 && (item.type === 'lesson' || item.type === 'book')) score += 2;
    return { ...item, score };
  }).filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);

  lastSearchResults = scored;

  const exact   = scored.filter(l => l.score >= 80);
  const partial = scored.filter(l => l.score < 80);

  if (scored.length === 0) {
    box.innerHTML = `<div class="sr-empty">No results for "<strong>${q}</strong>"</div>`;
  } else {
    let html = '';
    if (exact.length)   { html += `<div class="sr-section">Best Match</div>`;  html += exact.map((l,i) => srItem(l, q, scored.indexOf(l))).join(''); }
    if (partial.length) {
      if (exact.length) html += `<div class="sr-divider"></div>`;
      html += `<div class="sr-section">Related</div>`;
      html += partial.map((l,i) => srItem(l, q, scored.indexOf(l))).join('');
    }
    box.innerHTML = html;
    box.querySelectorAll('.sr-item').forEach(el => {
      el.onclick = () => {
        const item = lastSearchResults[Number(el.dataset.idx)];
        box.classList.remove('open');
        clearSearch();
        openSearchResult(item);
      };
    });
  }
  box.classList.add('open');
}

function openSearchResult(item) {
  if (item.type === 'lesson') {
    const lid = lessonId(item.stack.map(s => s.key), item.key);
    openLesson(item.href, item.label, lid);
  } else {
    navigateToStack(item.course, item.stack);
  }
}

const SR_TYPE_META = {
  lesson: { icon: 'bi-file-earmark-text-fill', label: 'Lesson' },
  book:   { icon: 'bi-book-fill',              label: 'Book'   },
  folder: { icon: 'bi-folder-fill',            label: 'Topic'  },
  course: { icon: 'bi-collection-fill',        label: 'Course' }
};

function srItem(l, q, idx) {
  const tm = SR_TYPE_META[l.type] || SR_TYPE_META.lesson;
  const subtitle = l.type === 'book' && l.author ? `by ${l.author}` : l.path;
  return `<div class="sr-item" data-idx="${idx}">
    <span class="sr-item-icon t-${l.type}"><i class="bi ${tm.icon}"></i></span>
    <div class="sr-item-body">
      <div class="sr-item-label">${highlightQuery(l.label, q)}<span class="sr-item-tag">${tm.label}</span></div>
      <div class="sr-path">${highlightQuery(subtitle, q)}</div>
    </div>
  </div>`;
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchClear').classList.remove('show');
}
function showSearch() {
  if (document.getElementById('searchInput').value.trim()) performSearch();
}

/* ══════════════════════════════
   SHARE
══════════════════════════════ */
let shareContext = { title:'', url:'' };

function openSharePopup(title, url, isLesson=false) {
  shareContext = { title, url };
  document.getElementById('shareSubtitle').textContent = isLesson
    ? `Share this lesson with others`
    : `Share "${title}" with others`;
  document.getElementById('shareUrlInput').value = url;
  document.getElementById('sharePopup').classList.add('open');
}
function closeSharePopup() { document.getElementById('sharePopup').classList.remove('open'); }
function handleShareOverlayClick(e) { if (e.target === e.currentTarget) closeSharePopup(); }
function copyShareUrl() {
  const input = document.getElementById('shareUrlInput');

  const legacyCopy = () => {
    try {
      input.select();
      input.setSelectionRange(0, input.value.length);
      const ok = document.execCommand('copy');
      if (ok) {
        showToast('<i class="bi bi-clipboard-check-fill"></i> Link copied!');
      } else {
        showToast('<i class="bi bi-exclamation-triangle-fill"></i> Copy failed — select and copy manually');
      }
    } catch (err) {
      showToast('<i class="bi bi-exclamation-triangle-fill"></i> Copy failed — select and copy manually');
    }
    closeSharePopup();
  };

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(input.value).then(() => {
      showToast('<i class="bi bi-clipboard-check-fill"></i> Link copied to clipboard!');
      closeSharePopup();
    }).catch(legacyCopy);
  } else {
    legacyCopy();
  }
}
function shareVia(method) {
  const url   = encodeURIComponent(shareContext.url);
  const title = encodeURIComponent('Missmonk — ' + shareContext.title);
  const text  = encodeURIComponent('Check this out on Missmonk: ' + shareContext.title);
  const links = {
    whatsapp: `https://wa.me/?text=${text}%20${url}`,
    telegram: `https://t.me/share/url?url=${url}&text=${text}`,
    twitter:  `https://twitter.com/intent/tweet?url=${url}&text=${text}`,
    email:    `mailto:?subject=${title}&body=${text}%20${url}`
  };
  if (links[method]) window.open(links[method], '_blank', 'noopener');
  closeSharePopup();
}

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
