<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Nuts — Missmonk</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<style>
:root {
  --bg:        #000000;
  --surface:   #0d0d0d;
  --surface2:  #141414;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --blue:      #5b8def;
  --amber:     #e0b34a;
  --rose:      #e0645f;
  --green:     #4caf7d;
  --teal:      #5cc4c4;
  --text:      #f2f2f2;
  --text2:     #a1a1a1;
  --text3:     #6b6b6b;
  --frame-w:   100%;
  --frame-radius: 0px;
  --frame-top: 0px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; overscroll-behavior-y:contain; }
body {
  font-family:'Satoshi',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ── RESPONSIVE FRAME (tablet / desktop) ──
   On wide viewports the reel column narrows to a phone-proportioned
   frame centered on screen instead of ugly full-width stretched cards. */
@media (min-width:640px) {
  :root { --frame-w:420px; }
  body {
    background:
      radial-gradient(circle at 50% 15%, rgba(91,141,239,0.10), transparent 55%),
      #030303;
  }
}
@media (min-width:900px) {
  :root { --frame-w:440px; --frame-radius:26px; --frame-top:20px; }
}
button { cursor:pointer; font-family:inherit; border:none; background:none; color:inherit; }
a { color:inherit; text-decoration:none; }

/* ── TOP BAR ── */
.reels-topbar {
  position:fixed; top:var(--frame-top); left:50%; z-index:40;
  transform:translateX(-50%);
  width:var(--frame-w);
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(.9rem + env(safe-area-inset-top)) 1rem .9rem;
  background:linear-gradient(rgba(0,0,0,.55), transparent);
  border-radius:var(--frame-radius) var(--frame-radius) 0 0;
  pointer-events:none;
}
.reels-topbar * { pointer-events:auto; }
.rt-back {
  width:38px; height:38px; border-radius:50%;
  background:#f2f2f2; border:1px solid rgba(0,0,0,.08);
  display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; color:#0a0a0a;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
}
.rt-title {
  font-family:'Clash Display',sans-serif; font-weight:700; font-size:1rem;
  color:#fff; letter-spacing:.02em; display:flex; align-items:center; gap:.4rem;
}
.rt-nut-icon { font-size:1.1rem; line-height:1; }

/* ── REEL FEED ── */
.reel-feed {
  position:relative; z-index:1;
  height:calc(100dvh - var(--frame-top) * 2); width:var(--frame-w);
  margin:var(--frame-top) auto 0;
  border-radius:var(--frame-radius);
  overflow-y:scroll;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  scroll-behavior:smooth;
}
.reel-feed::-webkit-scrollbar { display:none; }
@media (min-width:640px) {
  .reel-feed { box-shadow:0 0 0 1px var(--border2), 0 30px 80px rgba(0,0,0,.55); }
}

.reel-card {
  position:relative;
  height:100%; width:100%;
  scroll-snap-align:start;
  scroll-snap-stop:always;
  overflow:hidden;
  isolation:isolate;
  touch-action:manipulation;
  content-visibility:auto;
  contain-intrinsic-size:100% 100%;
}
.reel-particles {
  position:absolute; inset:0; z-index:-2;
}
.reel-monogram {
  position:absolute; z-index:-1;
  right:-.35em; bottom:-.28em;
  font-family:'Clash Display',sans-serif; font-weight:700;
  font-size:min(72vw, 62vh);
  line-height:1; color:var(--text);
  opacity:.05; user-select:none; pointer-events:none;
}

.reel-center {
  position:absolute; z-index:2; left:0; right:0; top:50%;
  transform:translateY(-50%);
  padding:0 1.4rem;
  max-width:560px; margin:0 auto;
  text-align:center;
  touch-action:manipulation;
}
.reel-title {
  font-family:'Clash Display',sans-serif; font-weight:700;
  font-size:clamp(1.5rem, 6vw, 2.1rem);
  line-height:1.15; margin-bottom:1.2rem;
  text-wrap:balance;
}
.reel-meaning {
  font-size:.95rem; line-height:1.55; color:var(--text2);
  display:-webkit-box; -webkit-line-clamp:5; -webkit-box-orient:vertical;
  overflow:hidden;
}

.reel-author-row {
  position:absolute; z-index:2; left:0; right:0;
  bottom:calc(2.4rem + env(safe-area-inset-bottom));
  padding:0 1.2rem; max-width:640px; margin:0 auto;
  display:flex; flex-direction:column; align-items:flex-start; gap:.4rem;
}
.reel-author-main {
  display:flex; align-items:center; gap:.6rem; width:100%;
}
.reel-book {
  font-size:.75rem; font-weight:600; letter-spacing:.03em;
  color:var(--text2); margin-left:calc(36px + .6rem);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:calc(100% - 36px - .6rem);
}
.reel-avatar {
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  background:var(--rc-a); color:#fff;
  display:flex; align-items:center; justify-content:center;
  font-family:'Clash Display',sans-serif; font-weight:700; font-size:1rem;
}
.reel-author {
  font-weight:700; font-size:.92rem; color:var(--text);
}
.reel-follow {
  margin-left:.3rem;
  padding:.4rem 1rem;
  border-radius:20px;
  background:var(--rc-a); color:#fff;
  font-size:.78rem; font-weight:700;
  display:flex; align-items:center; gap:.4rem;
  transition:transform .15s, opacity .15s;
}
.reel-follow:active { transform:scale(.95); opacity:.9; }

/* States */
.reel-state {
  position:absolute; inset:0; z-index:5;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:.9rem; text-align:center; padding:2rem;
  background:var(--bg); color:var(--text2);
}
.reel-state i { font-size:1.8rem; color:var(--text3); }
.reel-state .rs-title { font-family:'Clash Display',sans-serif; font-weight:700; color:var(--text); font-size:1.05rem; }
.reel-spinner {
  width:34px; height:34px; border-radius:50%;
  border:3px solid var(--border2); border-top-color:var(--blue);
  animation:rspin .8s linear infinite;
}
@keyframes rspin { to { transform:rotate(360deg); } }
.reel-retry {
  padding:.55rem 1.1rem; border-radius:10px; background:var(--blue); color:#fff;
  font-size:.82rem; font-weight:700;
}

/* ── MODE BAR ── */
.reels-modebar {
  position:fixed; z-index:39; left:50%;
  transform:translateX(-50%);
  width:var(--frame-w);
  top:calc(var(--frame-top) + 3.55rem + env(safe-area-inset-top));
  display:flex; align-items:center; justify-content:center; gap:.4rem;
  padding:.15rem 1rem; pointer-events:none;
}
.reels-modebar * { pointer-events:auto; }
.rm-btn {
  display:flex; align-items:center; gap:.35rem;
  padding:.45rem .85rem; border-radius:20px;
  background:#f2f2f2; border:1px solid rgba(0,0,0,.08);
  font-size:.75rem; font-weight:700; color:#0a0a0a;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  transition:background .15s, color .15s, border-color .15s, transform .15s;
  white-space:nowrap;
}
.rm-btn i { font-size:.85rem; }
.rm-btn.active { background:#0a0a0a; color:#fff; border-color:#0a0a0a; }
.rm-btn:active { transform:scale(.94); }

.rt-liked {
  width:38px; height:38px; border-radius:50%;
  background:#f2f2f2; border:1px solid rgba(0,0,0,.08);
  display:flex; align-items:center; justify-content:center;
  font-size:1.05rem; color:#0a0a0a;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  transition:background .15s, color .15s, transform .15s;
}
.rt-liked.active { background:var(--rose); color:#fff; border-color:var(--rose); }
.rt-liked:active { transform:scale(.9); }

/* ── LIKE ACTION ── */
.reel-actions {
  position:absolute; z-index:3; right:1.1rem;
  bottom:calc(9.2rem + env(safe-area-inset-bottom));
  display:flex; flex-direction:column; align-items:center; gap:.25rem;
}
.reel-like-btn {
  width:48px; height:48px; border-radius:50%;
  background:#f2f2f2; border:1px solid rgba(0,0,0,.08);
  display:flex; align-items:center; justify-content:center;
  font-size:1.45rem; color:#0a0a0a;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  transition:transform .15s, background .2s, border-color .2s;
  position:relative;
}
.reel-like-btn i { transition:transform .2s; }
.reel-like-btn.liked { background:#0a0a0a; color:var(--rose); border-color:#0a0a0a; }
.reel-like-btn.liked i { transform:scale(1.12); }
.reel-like-btn:active { transform:scale(.85); }
.reel-like-label { font-size:.68rem; color:var(--text2); font-weight:600; }

.reel-share-btn {
  width:48px; height:48px; border-radius:50%;
  background:#f2f2f2; border:1px solid rgba(0,0,0,.08);
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; color:#0a0a0a;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  transition:transform .15s, background .2s;
}
.reel-share-btn:active { transform:scale(.85); }
.reel-share-btn.copied { background:var(--green); color:#fff; }
.reel-share-label { font-size:.68rem; color:var(--text2); font-weight:600; }

/* ── SHARED-LINK FILTER BANNER ── */
.shared-banner {
  position:fixed; z-index:41; left:50%;
  transform:translateX(-50%);
  width:var(--frame-w);
  top:calc(var(--frame-top) + 6.6rem + env(safe-area-inset-top));
  display:flex; justify-content:center; pointer-events:none;
}
.shared-banner-inner {
  pointer-events:auto;
  display:flex; align-items:center; gap:.5rem;
  background:rgba(20,20,20,.92); border:1px solid var(--border2);
  padding:.5rem .6rem .5rem .9rem; border-radius:24px;
  font-size:.78rem; color:var(--text2);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.shared-banner-inner strong { color:var(--text); }
.shared-banner-btn {
  padding:.35rem .8rem; border-radius:16px;
  background:var(--blue); color:#fff;
  font-size:.74rem; font-weight:700; white-space:nowrap;
}

.reel-card.removing { animation:rcfade .25s ease forwards; }
@keyframes rcfade { to { opacity:0; transform:scale(.96); } }

/* ── LIKE ANIMATION ── */
@keyframes likePop {
  0%   { transform:scale(1); }
  35%  { transform:scale(1.4) rotate(-6deg); }
  55%  { transform:scale(.9); }
  75%  { transform:scale(1.12); }
  100% { transform:scale(1); }
}
.reel-like-btn.pop i { animation:likePop .5s ease; }
@keyframes ringPop {
  0%   { box-shadow:0 2px 8px rgba(0,0,0,.35), 0 0 0 0 rgba(224,100,95,.55); }
  100% { box-shadow:0 2px 8px rgba(0,0,0,.35), 0 0 0 20px rgba(224,100,95,0); }
}
.reel-like-btn.pop { animation:ringPop .55s ease-out; }

@keyframes floatHeart {
  0%   { transform:translate(-50%,0) scale(.4) rotate(0deg); opacity:1; }
  70%  { opacity:1; }
  100% { transform:translate(calc(-50% + var(--dx,0px)),-72px) scale(var(--sc,1.1)) rotate(var(--rot,0deg)); opacity:0; }
}
.like-burst-heart {
  position:absolute; left:50%; bottom:44px;
  font-size:1rem; pointer-events:none;
  animation:floatHeart .95s cubic-bezier(.17,.67,.3,1) forwards;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.35));
}

/* Big center heart on double-tap, Instagram-style */
.big-heart {
  position:absolute; z-index:6; left:50%; top:50%;
  transform:translate(-50%,-50%) scale(.3);
  color:#fff; font-size:6rem; opacity:0;
  pointer-events:none;
  filter:drop-shadow(0 0 22px rgba(224,100,95,.65)) drop-shadow(0 4px 18px rgba(0,0,0,.5));
}
.big-heart.show { animation:bigHeartPop .9s cubic-bezier(.17,.89,.32,1.49) forwards; }
@keyframes bigHeartPop {
  0%   { opacity:0;  transform:translate(-50%,-50%) scale(.3)  rotate(-10deg); }
  18%  { opacity:1;  transform:translate(-50%,-50%) scale(1.18) rotate(5deg); }
  34%  { transform:translate(-50%,-50%) scale(.94) rotate(-3deg); }
  48%  { transform:translate(-50%,-50%) scale(1.05) rotate(0deg); }
  78%  { opacity:1;  transform:translate(-50%,-50%) scale(1.02); }
  100% { opacity:0;  transform:translate(-50%,-50%) scale(1.08); }
}

/* ── SHARE ANIMATION ── */
@keyframes shareSwoosh {
  0%   { transform:translate(0,0) rotate(0deg) scale(1); }
  40%  { transform:translate(9px,-13px) rotate(22deg) scale(1.15); }
  70%  { transform:translate(2px,-4px) rotate(6deg) scale(.92); }
  100% { transform:translate(0,0) rotate(0deg) scale(1); }
}
.reel-share-btn.sending i { animation:shareSwoosh .6s ease; }
@keyframes shareRing {
  0%   { box-shadow:0 2px 8px rgba(0,0,0,.35), 0 0 0 0 rgba(91,141,239,.55); }
  100% { box-shadow:0 2px 8px rgba(0,0,0,.35), 0 0 0 18px rgba(91,141,239,0); }
}
.reel-share-btn.sending { animation:shareRing .6s ease-out; }
@keyframes sharePopCopied { 0%{transform:scale(1);} 45%{transform:scale(1.22);} 100%{transform:scale(1);} }
.reel-share-btn.copied { animation:sharePopCopied .4s ease; }

/* ── SHORT / LANDSCAPE SCREENS ── */
@media (max-height:480px) {
  .reel-center { top:44%; }
  .reel-title { font-size:1.25rem; margin-bottom:.5rem; }
  .reel-meaning { -webkit-line-clamp:2; font-size:.82rem; }
  .reel-author-row { bottom:calc(1rem + env(safe-area-inset-bottom)); gap:.25rem; }
  .reel-actions { bottom:calc(4.6rem + env(safe-area-inset-bottom)); gap:.15rem; }
  .reel-like-btn, .reel-share-btn { width:40px; height:40px; font-size:1.1rem; }
  .big-heart { font-size:4rem; }
}

/* ── POINTER / DESKTOP HOVER ── */
@media (hover:hover) and (pointer:fine) {
  .reel-like-btn:hover, .reel-share-btn:hover, .rt-liked:hover, .rm-btn:hover { transform:translateY(-1px) scale(1.05); }
  .reel-follow:hover { opacity:.88; }
  .rt-back:hover { opacity:.85; }
}
</style>
</head>
<body>

<div class="reels-topbar">
  <button class="rt-back" onclick="location.href='index.html'"><i class="bi bi-arrow-left"></i></button>
  <div class="rt-title"><span class="rt-nut-icon">🥜</span> Nuts</div>
  <button class="rt-liked" id="rtLikedBtn" onclick="switchMode('liked')"><i class="bi bi-heart-fill"></i></button>
</div>

<div class="reels-modebar" id="modeBar">
  <button class="rm-btn active" id="modeCycleBtn" onclick="cycleMode()"><i class="bi bi-shuffle"></i> Random</button>
</div>

<div class="reel-feed" id="reelFeed"></div>

<script>
/* ══════════════════════════════
   CONFIG
   Feed format: an object keyed by index, each value:
   { "title": "...", "author": "...", "meaning": "...", "link": "https://.../chapter.html" }
══════════════════════════════ */
const REELS_URL = 'https://microintel.github.io/missmonk/reel-data.json';

/* ══════════════════════════════
   LOAD & RENDER
══════════════════════════════ */
const ACCENTS = ['#5b8def', '#e0b34a', '#4caf7d', '#e0645f', '#5cc4c4'];

/* A different particle "personality" per reel, cycled by index. */
const PARTICLE_PRESETS = [
  // 0 — drifting dust
  (color) => ({
    particles: {
      number: { value:60, density:{ enable:true, value_area:900 } },
      color:  { value:color },
      shape:  { type:'circle' },
      opacity:{ value:0.4, random:true, anim:{ enable:true, speed:0.4, opacity_min:0.05, sync:false } },
      size:   { value:2.2, random:true },
      line_linked: { enable:false },
      move:   { enable:true, speed:0.5, direction:'none', random:true, out_mode:'out' }
    }
  }),
  // 1 — confetti triangles, gentle fall
  (color) => ({
    particles: {
      number: { value:35, density:{ enable:true, value_area:900 } },
      color:  { value:color },
      shape:  { type:'triangle' },
      opacity:{ value:0.5, random:true },
      size:   { value:4, random:true },
      line_linked: { enable:false },
      move:   { enable:true, speed:1.1, direction:'bottom', random:true, straight:false, out_mode:'out' }
    }
  }),
  // 2 — constellation network
  (color) => ({
    particles: {
      number: { value:45, density:{ enable:true, value_area:900 } },
      color:  { value:color },
      shape:  { type:'circle' },
      opacity:{ value:0.5 },
      size:   { value:2, random:true },
      line_linked: { enable:true, distance:130, color:color, opacity:0.3, width:1 },
      move:   { enable:true, speed:0.7, direction:'none', random:true, out_mode:'out' }
    }
  }),
  // 3 — twinkling stars
  (color) => ({
    particles: {
      number: { value:80, density:{ enable:true, value_area:900 } },
      color:  { value:color },
      shape:  { type:'star' },
      opacity:{ value:0.6, random:true, anim:{ enable:true, speed:1, opacity_min:0.1, sync:false } },
      size:   { value:2.5, random:true },
      line_linked: { enable:false },
      move:   { enable:true, speed:0.25, direction:'none', random:true, out_mode:'out' }
    }
  }),
  // 4 — floating bubbles
  (color) => ({
    particles: {
      number: { value:28, density:{ enable:true, value_area:900 } },
      color:  { value:color },
      shape:  { type:'polygon', polygon:{ nb_sides:6 } },
      opacity:{ value:0.35, random:true },
      size:   { value:6, random:true },
      line_linked: { enable:false },
      move:   { enable:true, speed:0.8, direction:'top', random:true, straight:false, out_mode:'out' }
    }
  })
];

function particleConfigFor(i) {
  const color = ACCENTS[i % ACCENTS.length];
  const preset = PARTICLE_PRESETS[i % PARTICLE_PRESETS.length](color);
  return {
    ...preset,
    interactivity: {
      detect_on:'canvas',
      events:{ onhover:{ enable:false }, onclick:{ enable:false }, resize:true }
    },
    retina_detect:true
  };
}

/* New feed format:
   {
     "Book Name": {
       "author": "...",
       "chapters": [
         { "title": "...", "meaning": "...", "link": "..." },
         ...
       ]
     },
     ...
   }
   A chapter is only included if it has both a non-empty title AND meaning —
   chapters missing either (like placeholders) are silently skipped. */
function normalizeItems(raw) {
  const items = [];
  if (!raw || typeof raw !== 'object') return items;

  Object.keys(raw).forEach(bookName => {
    const book = raw[bookName] || {};
    const chapters = Array.isArray(book.chapters) ? book.chapters : [];
    chapters.forEach(ch => {
      const title = (ch && ch.title || '').trim();
      const meaning = (ch && ch.meaning || '').trim();
      if (!title || !meaning) return; // incomplete chapter — skip

      items.push({
        idx: items.length,
        book:    bookName,
        title,
        meaning,
        author:  book.author || 'Unknown',
        link:    (ch.link && ch.link.trim()) || '#'
      });
    });
  });

  return items;
}

/* ══════════════════════════════
   LIKES — stored in IndexedDB, keyed by the reel's stable idx
══════════════════════════════ */
const LIKES_DB_NAME = 'reelsLikesDB';
const LIKES_STORE   = 'likes';
let likedIndices = new Set();

function dbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(LIKES_DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(LIKES_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
async function dbLoadLikes() {
  try {
    const db = await dbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(LIKES_STORE, 'readonly');
      const req = tx.objectStore(LIKES_STORE).getAllKeys();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror   = () => reject(req.error);
    });
  } catch (e) { console.warn('IndexedDB unavailable', e); return []; }
}
async function dbSetLiked(idx, liked) {
  try {
    const db = await dbOpen();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(LIKES_STORE, 'readwrite');
      const store = tx.objectStore(LIKES_STORE);
      if (liked) store.put(true, idx); else store.delete(idx);
      tx.oncomplete = () => resolve();
      tx.onerror    = () => reject(tx.error);
    });
  } catch (e) { console.warn('IndexedDB write failed', e); }
}

/* Some browser contexts (Safari private mode, in-app webviews, blocked
   third-party storage) let indexedDB.open() hang forever without ever
   firing onsuccess/onerror. Race any DB call against a timeout so a stuck
   IndexedDB can never block the feed from loading. */
function withTimeout(promise, ms, fallback) {
  return Promise.race([
    promise,
    new Promise(resolve => setTimeout(() => resolve(fallback), ms))
  ]);
}

/* ══════════════════════════════
   LOAD
══════════════════════════════ */
let allItems = [];
let mode = null;
let feedOrder = [];
let renderSeq = 0;

async function loadReels() {
  const feed = document.getElementById('reelFeed');
  showState(feed, 'spinner', 'Loading…');
  try {
    const res = await fetch(REELS_URL, { cache:'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allItems = normalizeItems(data);
    if (!allItems.length) throw new Error('Empty feed');
    likedIndices = new Set(await withTimeout(dbLoadLikes(), 1500, []));

    const sharedIdx = findSharedReelIndex();
    if (sharedIdx !== -1) {
      showSharedReel(sharedIdx);
    } else {
      switchMode('random');
    }
  } catch (err) {
    showState(feed, 'error', "Couldn't load the feed", err.message);
  }
}

/* Reads ?book=...&title=... from the URL (set by the share feature) and
   finds the matching reel, if any. Clears those params from the address
   bar once read, so refreshing later doesn't keep re-filtering. */
function findSharedReelIndex() {
  const params = new URLSearchParams(location.search);
  const book = params.get('book');
  const title = params.get('title');
  if (!book || !title) return -1;

  history.replaceState(null, '', location.pathname + location.hash);
  return allItems.findIndex(it => it.book === book && it.title === title);
}

function showState(feed, kind, title, detail) {
  if (kind === 'spinner') {
    feed.innerHTML = `<div class="reel-state"><div class="reel-spinner"></div><div class="rs-title">${title}</div></div>`;
  } else if (kind === 'empty') {
    feed.innerHTML = `<div class="reel-state">
      <i class="bi bi-heart"></i>
      <div class="rs-title">${title}</div>
      <div style="font-size:.8rem;max-width:260px;">${detail || ''}</div>
      <button class="reel-retry" onclick="switchMode('random')">Browse nuts</button>
    </div>`;
  } else {
    feed.innerHTML = `<div class="reel-state">
      <i class="bi bi-exclamation-triangle"></i>
      <div class="rs-title">${title}</div>
      <div style="font-size:.8rem;max-width:260px;">${detail || ''}</div>
      <button class="reel-retry" onclick="loadReels()">Try again</button>
    </div>`;
  }
}

/* ══════════════════════════════
   MODE SWITCHING
   - serial:   original order
   - random:   shuffled, each reel shown once (no repeat)
   - repeated: random with repeats, extends infinitely as user scrolls
   - liked:    only reels the user has liked
══════════════════════════════ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randomRepeatBatch(count, avoidFirst) {
  const n = allItems.length;
  const out = [];
  let last = avoidFirst;
  for (let i = 0; i < count; i++) {
    let pick;
    do { pick = Math.floor(Math.random() * n); } while (n > 1 && pick === last);
    out.push(pick);
    last = pick;
  }
  return out;
}

let modeSwitching = false;

/* Single-button cycling: tap steps through these modes in order.
   'liked' is reached separately via the heart button in the topbar. */
const MODE_CYCLE = ['random', 'repeated', 'serial'];
const MODE_META = {
  random:   { icon: 'bi-shuffle',      label: 'Random' },
  repeated: { icon: 'bi-arrow-repeat', label: 'Repeated' },
  serial:   { icon: 'bi-list-ol',      label: 'Serial' }
};
function cycleMode() {
  const curIdx = MODE_CYCLE.indexOf(mode);
  const nextIdx = curIdx === -1 ? 0 : (curIdx + 1) % MODE_CYCLE.length;
  switchMode(MODE_CYCLE[nextIdx]);
}

function switchMode(newMode) {
  if (!allItems.length || modeSwitching || newMode === mode) return;
  modeSwitching = true;
  mode = newMode;
  removeSharedBanner();

  const cycleBtn = document.getElementById('modeCycleBtn');
  if (MODE_META[mode]) {
    cycleBtn.innerHTML = `<i class="bi ${MODE_META[mode].icon}"></i> ${MODE_META[mode].label}`;
    cycleBtn.classList.add('active');
  } else {
    cycleBtn.classList.remove('active');
  }
  document.getElementById('rtLikedBtn').classList.toggle('active', mode === 'liked');

  if (mode === 'serial') {
    feedOrder = allItems.map(it => it.idx);
  } else if (mode === 'random') {
    feedOrder = shuffle(allItems.map(it => it.idx));
  } else if (mode === 'repeated') {
    feedOrder = randomRepeatBatch(Math.min(12, Math.max(6, allItems.length)), -1);
  } else if (mode === 'liked') {
    feedOrder = allItems.filter(it => likedIndices.has(it.idx)).map(it => it.idx);
  }

  const feed = document.getElementById('reelFeed');
  if (mode === 'liked' && !feedOrder.length) {
    showState(feed, 'empty', 'No liked nuts yet', 'Tap the heart on one to save it here.');
    setTimeout(() => { modeSwitching = false; }, 300);
    return;
  }

  renderFull(feedOrder);
  feed.scrollTo({ top: 0 });
  setTimeout(() => { modeSwitching = false; }, 300);
}

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function cardHtml(idx) {
  const it = allItems[idx];
  const seq = ++renderSeq;
  const color = ACCENTS[idx % ACCENTS.length];
  const initial = (it.title || '?').trim().charAt(0).toUpperCase();
  const liked = likedIndices.has(idx);
  return {
    idx, seq,
    html: `
    <section class="reel-card" data-idx="${idx}" data-seq="${seq}" style="--rc-a:${color};">
      <div class="reel-particles" id="particles-${seq}"></div>
      <div class="reel-monogram">${initial}</div>
      <div class="reel-center" onclick="handleCenterTap(event, ${idx}, ${seq})">
        <div class="reel-title">${escapeHtml(it.title)}</div>
        <div class="reel-meaning">${escapeHtml(it.meaning)}</div>
      </div>
      <div class="reel-actions">
        <button class="reel-like-btn${liked ? ' liked' : ''}" data-idx="${idx}" onclick="handleLikeClick(event, ${idx}, this)">
          <i class="bi ${liked ? 'bi-heart-fill' : 'bi-heart'}"></i>
        </button>
        <span class="reel-like-label">Like</span>
        <button class="reel-share-btn" data-idx="${idx}" onclick="handleShareClick(event, ${idx}, this)" style="margin-top:.5rem;">
          <i class="bi bi-share-fill"></i>
        </button>
        <span class="reel-share-label">Share</span>
      </div>
      <div class="reel-author-row">
        <div class="reel-author-main">
          <div class="reel-avatar">${initial}</div>
          <div class="reel-author">${escapeHtml(it.author)}</div>
          <button class="reel-follow" onclick="goToChapter('${encodeURI(it.link)}')">
            <i class="bi bi-arrow-right-circle-fill"></i> Follow
          </button>
        </div>
        <div class="reel-book">${escapeHtml(it.book)}</div>
      </div>
    </section>`
  };
}

/* ══════════════════════════════
   VIRTUALIZED FEED
   With thousands of reels, mounting every card (and running a live
   particles.js canvas for each) would freeze the tab. Instead we keep a
   small sliding window of cards in the DOM — the current one plus a
   couple ahead/behind — and grow/shrink that window as the user scrolls.
   feedOrder itself can still hold the full list (or grow indefinitely for
   'repeated' mode); only a slice of it is ever actually rendered.
══════════════════════════════ */
const RENDER_AHEAD  = 2;  // cards kept mounted ahead of the current one
const RENDER_BEHIND = 2;  // cards kept mounted behind the current one
const APPEND_CHUNK   = 3; // cards added at a time when nearing the mounted end
const PRUNE_DEBOUNCE = 220; // ms to wait after scrolling stops before pruning

let renderedFrom = 0;       // feedOrder index of the first mounted DOM child
let mountedCount  = 0;      // number of DOM children currently mounted
let virtualizationReady = false;

/* particles.js keeps its own registry (window.pJSDom) of running instances
   with their own requestAnimationFrame loops. Just removing the container
   div from the DOM leaves that loop running in the background — this
   properly stops and unregisters it so removed cards don't leak CPU. */
function destroyParticlesIn(container) {
  if (!container || !window.pJSDom) return;
  const canvas = container.querySelector('canvas');
  if (!canvas) return;
  const i = window.pJSDom.findIndex(p => p && p.pJS && p.pJS.canvas && p.pJS.canvas.el === canvas);
  if (i !== -1) {
    try { window.pJSDom[i].pJS.fn.vendors.destroypJS(); } catch (e) { /* already gone */ }
    window.pJSDom.splice(i, 1);
  }
}
function destroyAllParticles(feed) {
  feed.querySelectorAll('.reel-particles').forEach(destroyParticlesIn);
}

function mountCardsAtEnd(feed, count) {
  if (mode === 'repeated') {
    while (feedOrder.length < renderedFrom + mountedCount + count) {
      const last = feedOrder.length ? feedOrder[feedOrder.length - 1] : -1;
      feedOrder = feedOrder.concat(randomRepeatBatch(6, last));
    }
  }
  const from = renderedFrom + mountedCount;
  const to   = Math.min(from + count, feedOrder.length);
  if (to <= from) return;
  const cards = feedOrder.slice(from, to).map(idx => cardHtml(idx));
  feed.insertAdjacentHTML('beforeend', cards.map(c => c.html).join(''));
  cards.forEach(c => particlesJS(`particles-${c.seq}`, particleConfigFor(c.idx)));
  mountedCount += (to - from);
}

function pruneCardsFromStart(feed, count) {
  if (count <= 0) return;
  const cardHeight = feed.clientHeight || 1;
  let removed = 0;
  for (let i = 0; i < count; i++) {
    const first = feed.firstElementChild;
    if (!first) break;
    destroyParticlesIn(first.querySelector('.reel-particles'));
    first.remove();
    removed++;
  }
  renderedFrom += removed;
  mountedCount  -= removed;
  feed.scrollTop -= removed * cardHeight; // keep the visible card in place
}

function renderFull(order) {
  feedOrder = order;
  const feed = document.getElementById('reelFeed');
  destroyAllParticles(feed);
  feed.innerHTML = '';
  renderSeq = 0;
  renderedFrom = 0;
  mountedCount = 0;
  mountCardsAtEnd(feed, RENDER_AHEAD + APPEND_CHUNK + 1);
  if (!virtualizationReady) {
    enableSwipeNav(feed);
    enableFeedVirtualization(feed);
    virtualizationReady = true;
  }
}

function enableFeedVirtualization(feed) {
  let pruneTimer = null;
  feed.addEventListener('scroll', () => {
    const cardHeight = feed.clientHeight || 1;
    const domIndex = Math.round(feed.scrollTop / cardHeight);

    // Grow the window forward immediately so fast scrolling never outruns
    // the DOM (no blank cards flashing in).
    if (domIndex >= mountedCount - RENDER_AHEAD - 1) {
      mountCardsAtEnd(feed, APPEND_CHUNK);
    }

    // Shrink the window from the back only once scrolling settles, so an
    // in-progress touch/momentum scroll never gets its scrollTop tugged.
    clearTimeout(pruneTimer);
    pruneTimer = setTimeout(() => {
      const idx = Math.round(feed.scrollTop / (feed.clientHeight || 1));
      const pruneCount = idx - RENDER_BEHIND;
      if (pruneCount > 0) pruneCardsFromStart(feed, pruneCount);
    }, PRUNE_DEBOUNCE);
  });
}

/* ══════════════════════════════
   SOUND — tiny synthesized tones via Web Audio, no external audio files
   to fetch, so it works instantly and offline. Context is created lazily
   on first tap (autoplay policies require a user gesture).
══════════════════════════════ */
let audioCtx = null;
function getAudioCtx() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  } catch (e) { return null; }
}
function tone(freq, start, dur, type, peak) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, start);
  gain.gain.setValueAtTime(0, start);
  gain.gain.linearRampToValueAtTime(peak || 0.16, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(start);
  osc.stop(start + dur + 0.02);
}
function playLikeSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  tone(760, now, 0.14, 'sine', 0.16);
  tone(1180, now + 0.06, 0.18, 'sine', 0.14);
}
function playUnlikeSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(480, now);
  osc.frequency.exponentialRampToValueAtTime(240, now + 0.15);
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.17);
  osc.connect(gain).connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.2);
}
function playShareSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(620, now);
  osc.frequency.exponentialRampToValueAtTime(1250, now + 0.16);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.linearRampToValueAtTime(0.14, now + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
  osc.connect(gain).connect(ctx.destination);
  osc.start(now); osc.stop(now + 0.22);
}

/* ══════════════════════════════
   LIKE HANDLING
══════════════════════════════ */
async function handleLikeClick(e, idx, btnEl) {
  e.stopPropagation();
  const nowLiked = !likedIndices.has(idx);
  if (nowLiked) likedIndices.add(idx); else likedIndices.delete(idx);
  btnEl.classList.toggle('liked', nowLiked);
  btnEl.querySelector('i').className = 'bi ' + (nowLiked ? 'bi-heart-fill' : 'bi-heart');
  await dbSetLiked(idx, nowLiked);

  if (nowLiked) {
    playLikeSound();
    if (navigator.vibrate) navigator.vibrate(18);
    btnEl.classList.remove('pop');
    void btnEl.offsetWidth; // restart animation
    btnEl.classList.add('pop');
    setTimeout(() => btnEl.classList.remove('pop'), 550);
    spawnLikeBurst(btnEl.parentElement);
  } else {
    playUnlikeSound();
  }

  if (mode === 'liked' && !nowLiked) {
    const card = btnEl.closest('.reel-card');
    if (card) {
      card.classList.add('removing');
      setTimeout(() => {
        destroyParticlesIn(card.querySelector('.reel-particles'));
        card.remove();
        mountedCount = Math.max(0, mountedCount - 1);
        feedOrder = feedOrder.filter(i => i !== idx);
        if (!feedOrder.length) {
          showState(document.getElementById('reelFeed'), 'empty', 'No liked nuts yet', 'Tap the heart on one to save it here.');
        }
      }, 220);
    }
  }
}

/* A little confetti burst of hearts in mixed colors/sizes/rotations,
   floating up from the like button. */
function spawnLikeBurst(container) {
  if (!container) return;
  for (let i = 0; i < 7; i++) {
    const h = document.createElement('span');
    h.className = 'like-burst-heart';
    h.innerHTML = '<i class="bi bi-heart-fill"></i>';
    const dx    = Math.round(Math.random() * 60 - 30);
    const rot   = Math.round(Math.random() * 50 - 25);
    const scale = (0.75 + Math.random() * 0.7).toFixed(2);
    h.style.setProperty('--dx', dx + 'px');
    h.style.setProperty('--rot', rot + 'deg');
    h.style.setProperty('--sc', scale);
    h.style.color = i % 3 === 0 ? 'var(--amber)' : 'var(--rose)';
    h.style.marginLeft = Math.round(Math.random() * 20 - 10) + 'px';
    h.style.animationDelay = (i * 0.045) + 's';
    container.appendChild(h);
    setTimeout(() => h.remove(), 1050);
  }
}

/* Double-tap on the title/meaning text (Instagram-style): shows one big
   heart in the center of the card and likes the reel if not already liked.
   Tracked manually off the click event (fires for both mouse and touch)
   rather than dblclick, so mouse and touch behave identically and it never
   double-toggles. */
let lastTapTime = 0;
function handleCenterTap(e, idx, seq) {
  const now = Date.now();
  const isDouble = now - lastTapTime < 320;
  lastTapTime = isDouble ? 0 : now;
  if (!isDouble) return;

  const card = document.querySelector(`.reel-card[data-seq="${seq}"]`);
  if (!card) return;
  spawnBigHeart(card);
  if (!likedIndices.has(idx)) {
    const btn = card.querySelector('.reel-like-btn');
    if (btn) handleLikeClick(e, idx, btn);
  } else {
    playLikeSound();
    if (navigator.vibrate) navigator.vibrate(12);
  }
}
function spawnBigHeart(card) {
  const heart = document.createElement('div');
  heart.className = 'big-heart';
  heart.innerHTML = '<i class="bi bi-heart-fill"></i>';
  card.appendChild(heart);
  requestAnimationFrame(() => heart.classList.add('show'));
  setTimeout(() => heart.remove(), 950);
}

/* ══════════════════════════════
   SHARE — encode the reel's book + chapter title in the URL so that
   whoever opens the link lands directly on that reel, filtered to just it.
══════════════════════════════ */
function buildShareUrl(idx) {
  const it = allItems[idx];
  const url = new URL(location.href);
  url.search = '';
  url.searchParams.set('book', it.book);
  url.searchParams.set('title', it.title);
  return url.toString();
}

async function handleShareClick(e, idx, btnEl) {
  e.stopPropagation();
  const it = allItems[idx];
  const url = buildShareUrl(idx);

  playShareSound();
  if (navigator.vibrate) navigator.vibrate(12);
  btnEl.classList.remove('sending');
  void btnEl.offsetWidth; // restart animation
  btnEl.classList.add('sending');
  setTimeout(() => btnEl.classList.remove('sending'), 650);

  if (navigator.share) {
    try {
      await navigator.share({ title: it.title, text: `${it.title} — from ${it.book}`, url });
    } catch (err) { /* user dismissed the share sheet — nothing to do */ }
    return;
  }

  try {
    await navigator.clipboard.writeText(url);
    flashShareCopied(btnEl);
  } catch (err) {
    window.prompt('Copy this link to share:', url);
  }
}

function flashShareCopied(btnEl) {
  const icon = btnEl.querySelector('i');
  const prevClass = icon.className;
  btnEl.classList.add('copied');
  icon.className = 'bi bi-check-lg';
  setTimeout(() => {
    btnEl.classList.remove('copied');
    icon.className = prevClass;
  }, 1200);
}

/* Land on a single shared reel, filtered out from the rest of the feed,
   with a banner offering to go back to browsing everything. */
function showSharedReel(idx) {
  mode = 'shared';
  feedOrder = [idx];
  renderFull(feedOrder);
  document.getElementById('reelFeed').scrollTo({ top: 0 });

  const cycleBtn = document.getElementById('modeCycleBtn');
  if (cycleBtn) cycleBtn.classList.remove('active');
  document.getElementById('rtLikedBtn').classList.remove('active');

  showSharedBanner(allItems[idx]);
}

function showSharedBanner(it) {
  removeSharedBanner();
  const banner = document.createElement('div');
  banner.className = 'shared-banner';
  banner.id = 'sharedBanner';
  banner.innerHTML = `
    <div class="shared-banner-inner">
      <span>Shared: <strong>${escapeHtml(it.title)}</strong></span>
      <button class="shared-banner-btn" onclick="exitSharedView()">Browse all</button>
    </div>`;
  document.body.appendChild(banner);
}

function removeSharedBanner() {
  const el = document.getElementById('sharedBanner');
  if (el) el.remove();
}

function exitSharedView() {
  removeSharedBanner();
  mode = null; // let switchMode actually run even though it may equal a prior mode
  switchMode('random');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function goToChapter(link) {
  const url = decodeURI(link);
  if (!url || url === '#') return;
  window.location.href = url;
}

/* One reel per gesture — mirrors Instagram Reels paging (native touch swipe
   already snaps per-card via CSS scroll-snap; this adds the same deliberate
   behavior for mouse wheel + keyboard, with a short lock so a single
   scroll/key doesn't skip past more than one card). */
function enableSwipeNav(feed) {
  const cards = () => Array.from(feed.children);
  let locked = false;
  let wheelAccum = 0;
  let wheelResetTimer = null;

  function currentIndex() {
    const items = cards();
    let best = 0, bestDist = Infinity;
    items.forEach((el, i) => {
      const d = Math.abs(el.offsetTop - feed.scrollTop);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    return best;
  }

  function goTo(index) {
    const items = cards();
    if (index < 0 || index >= items.length) return;
    locked = true;
    feed.scrollTo({ top: items[index].offsetTop, behavior:'smooth' });
    clearTimeout(goTo._t);
    goTo._t = setTimeout(() => { locked = false; }, 550);
  }

  function step(dir) {
    if (locked) return;
    goTo(currentIndex() + dir);
  }

  feed.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (locked) return;
    wheelAccum += e.deltaY;
    clearTimeout(wheelResetTimer);
    wheelResetTimer = setTimeout(() => { wheelAccum = 0; }, 150);
    if (Math.abs(wheelAccum) > 35) {
      step(wheelAccum > 0 ? 1 : -1);
      wheelAccum = 0;
    }
  }, { passive:false });

  document.onkeydown = (e) => {
    if (e.key !== 'ArrowDown' && e.key !== 'ArrowUp') return;
    e.preventDefault();
    step(e.key === 'ArrowDown' ? 1 : -1);
  };
}

loadReels();
</script>
</body>
</html>
